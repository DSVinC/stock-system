<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>条件单 | A股投资系统</title>
  <link rel="stylesheet" href="./pages/style.css" />
  <style>
    /* 页面特定样式 */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .top-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    .top-nav a.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }

    .tabs-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-pending {
      background: rgba(96, 165, 250, 0.15);
      color: var(--info);
    }

    .status-triggered {
      background: rgba(74, 222, 128, 0.15);
      color: var(--good);
    }

    .status-cancelled {
      background: rgba(251, 113, 133, 0.15);
      color: var(--bad);
    }

    .status-expired {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-faint);
    }

    .action-tag {
      font-weight: 600;
    }

    .action-tag.buy { color: var(--bad); }
    .action-tag.sell { color: var(--good); }

    /* 操作按钮组 */
    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-soft);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .action-btn.primary {
      background: rgba(56, 189, 248, 0.15);
      border-color: rgba(56, 189, 248, 0.3);
      color: var(--accent);
    }

    .action-btn.primary:hover {
      background: rgba(56, 189, 248, 0.25);
    }

    .action-btn.danger {
      background: rgba(251, 113, 133, 0.15);
      border-color: rgba(251, 113, 133, 0.3);
      color: var(--bad);
    }

    .action-btn.danger:hover {
      background: rgba(251, 113, 133, 0.25);
    }

    /* 导出提示 */
    .export-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.9);
      color: white;
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .export-toast.show {
      opacity: 1;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--bg-accent);
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-soft);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
    }

    .form-input,
    .form-select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.46);
      color: var(--text);
      font-size: 14px;
    }

    .form-select {
      cursor: pointer;
    }

    .form-input:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .form-actions .button {
      flex: 1;
    }

    .condition-item {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .condition-item select,
    .condition-item input {
      flex: 1;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.6);
      color: var(--text);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .page-header {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .tabs-bar {
        flex-wrap: wrap;
      }

      .tab-btn {
        flex: 1;
        min-width: 80px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <header class="page-header">
      <h1 class="page-title">条件单管理</h1>
      <nav class="page-nav">
        <a href="index.html">监控池</a>
        <a href="analysis.html">个股分析</a>
        <a href="portfolio.html">账户</a>
        <a href="conditional-order.html">条件单</a>
      </nav>
    </header>

    <section class="panel">
      <div class="panel-inner">
        <div class="status-row">
          <h2 class="section-title">条件单列表</h2>
          <button class="button" onclick="showCreateModal()">+ 新建条件单</button>
        </div>

        <div class="tabs-bar">
          <button class="tab-btn active" onclick="filterOrders('all')">全部</button>
          <button class="tab-btn" onclick="filterOrders('pending')">待触发</button>
          <button class="tab-btn" onclick="filterOrders('triggered')">已触发</button>
          <button class="tab-btn" onclick="filterOrders('cancelled')">已取消</button>
        </div>

        <div id="order-list">
          <div class="empty-state">
            <p class="empty-title">暂无条件单</p>
            <p class="empty-copy">点击上方按钮创建条件单</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 创建条件单弹窗 -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">新建条件单</h3>
        <button class="modal-close" onclick="closeCreateModal()">&times;</button>
      </div>
      <form id="create-form" onsubmit="createOrder(event)">
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">股票代码</label>
            <input type="text" class="form-input" name="ts_code" placeholder="300308.SZ" required>
          </div>
          <div class="form-field">
            <label class="form-label">股票名称</label>
            <input type="text" class="form-input" name="stock_name" placeholder="中际旭创" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">交易动作</label>
            <select class="form-select" name="action" required>
              <option value="buy">买入</option>
              <option value="sell">卖出</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">条件单类型</label>
            <select class="form-select" name="order_type" required>
              <option value="price">价格条件</option>
              <option value="indicator">技术指标</option>
              <option value="capital">资金条件</option>
              <option value="composite">复合条件</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">交易数量/金额</label>
          <div class="form-row">
            <input type="number" class="form-input" name="quantity" placeholder="数量（股）" min="100" step="100">
            <input type="number" class="form-input" name="amount" placeholder="金额（元）">
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">触发条件</label>
          <div id="conditions-list">
            <div class="condition-item">
              <select class="cond-type">
                <option value="price">股价</option>
                <option value="pct_change">涨跌幅(%)</option>
                <option value="volume_ratio">量比</option>
                <option value="rsi">RSI</option>
                <option value="macd_cross">MACD信号</option>
              </select>
              <select class="cond-op">
                <option value=">=">>=</option>
                <option value="<="><=</option>
                <option value=">">></option>
                <option value="<"><</option>
              </select>
              <input type="text" class="cond-value" placeholder="数值">
              <button type="button" class="button button-danger" style="min-height:42px;padding:0 12px;font-size:12px;" onclick="removeCondition(this)">删除</button>
            </div>
          </div>
          <button type="button" class="button button-secondary" style="margin-top:10px;" onclick="addCondition()">+ 添加条件</button>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">有效期开始</label>
            <input type="date" class="form-input" name="start_date" required>
          </div>
          <div class="form-field">
            <label class="form-label">有效期结束</label>
            <input type="date" class="form-input" name="end_date" required>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">最大触发次数</label>
          <input type="number" class="form-input" name="max_trigger_count" value="1" min="1" required>
        </div>

        <div class="form-actions">
          <button type="submit" class="button">创建</button>
          <button type="button" class="button button-secondary" onclick="closeCreateModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentFilter = 'all';
    let currentAccountId = null;

    async function api(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      return response.json();
    }

    function getAccountId() {
      currentAccountId = parseInt(localStorage.getItem('current_account_id'));
      return currentAccountId;
    }

    async function loadOrders() {
      const accountId = getAccountId();
      if (!accountId) {
        document.getElementById('order-list').innerHTML = '<div class="empty-state"><p class="empty-copy">请先选择账户</p></div>';
        return;
      }

      const url = currentFilter === 'all'
        ? `/api/conditional-order?account_id=${accountId}`
        : `/api/conditional-order?account_id=${accountId}&status=${currentFilter}`;

      const result = await api(url);
      const listEl = document.getElementById('order-list');

      if (!result.success || result.data.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><p class="empty-title">暂无条件单</p><p class="empty-copy">点击上方按钮创建</p></div>';
        return;
      }

      listEl.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>状态</th>
                <th>股票</th>
                <th>动作</th>
                <th>条件</th>
                <th>有效期</th>
                <th>触发</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${result.data.map(order => `
                <tr>
                  <td><span class="status-badge status-${order.status}">${getStatusText(order.status)}</span></td>
                  <td>${order.ts_code}<br><small style="color:var(--text-soft)">${order.stock_name}</small></td>
                  <td><span class="action-tag ${order.action === 'buy' ? 'buy' : 'sell'}">${order.action === 'buy' ? '买入' : '卖出'}</span></td>
                  <td>${formatConditions(order.conditions)}</td>
                  <td>${order.start_date} 至 ${order.end_date}</td>
                  <td>${order.trigger_count}/${order.max_trigger_count}</td>
                  <td>
                    <div class="action-buttons">
                      <button class="action-btn primary" onclick="exportToBacktest(${order.id})">导入回测</button>
                      <button class="action-btn" onclick="copyOrderData(${order.id})">复制</button>
                      ${order.status === 'pending' ? `
                        <button class="action-btn danger" onclick="cancelOrder(${order.id})">取消</button>
                      ` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function getStatusText(status) {
      const map = { pending: '待触发', triggered: '已触发', cancelled: '已取消', expired: '已过期' };
      return map[status] || status;
    }

    function formatConditions(conditions) {
      if (!conditions || conditions.length === 0) return '-';
      return conditions.map(c => `${c.type}${c.operator}${c.value}`).join('、');
    }

    function filterOrders(status) {
      currentFilter = status;
      document.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      loadOrders();
    }

    function showCreateModal() {
      if (!getAccountId()) {
        alert('请先创建并选择账户');
        return;
      }
      const today = new Date().toISOString().split('T')[0];
      const threeMonthsLater = new Date();
      threeMonthsLater.setMonth(threeMonthsLater.getMonth() + 3);
      document.querySelector('[name="start_date"]').value = today;
      document.querySelector('[name="end_date"]').value = threeMonthsLater.toISOString().split('T')[0];
      document.getElementById('create-modal').classList.add('show');
    }

    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('show');
    }

    function addCondition() {
      const list = document.getElementById('conditions-list');
      const row = document.createElement('div');
      row.className = 'condition-item';
      row.innerHTML = `
        <select class="cond-type">
          <option value="price">股价</option>
          <option value="pct_change">涨跌幅(%)</option>
          <option value="volume_ratio">量比</option>
          <option value="rsi">RSI</option>
          <option value="macd_cross">MACD信号</option>
        </select>
        <select class="cond-op">
          <option value=">=">>=</option>
          <option value="<="><=</option>
          <option value=">">></option>
          <option value="<"><</option>
        </select>
        <input type="text" class="cond-value" placeholder="数值">
        <button type="button" class="button button-danger" style="min-height:42px;padding:0 12px;font-size:12px;" onclick="removeCondition(this)">删除</button>
      `;
      list.appendChild(row);
    }

    function removeCondition(btn) {
      btn.parentElement.remove();
    }

    async function createOrder(e) {
      e.preventDefault();
      const form = e.target;

      const conditions = [];
      document.querySelectorAll('.condition-item').forEach(row => {
        const type = row.querySelector('.cond-type').value;
        const operator = row.querySelector('.cond-op').value;
        const value = row.querySelector('.cond-value').value;
        if (value) {
          conditions.push({ type, operator, value: parseFloat(value) || value });
        }
      });

      const data = {
        account_id: getAccountId(),
        ts_code: form.ts_code.value,
        stock_name: form.stock_name.value,
        action: form.action.value,
        order_type: form.order_type.value,
        quantity: form.quantity.value ? parseInt(form.quantity.value) : null,
        amount: form.amount.value ? parseFloat(form.amount.value) : null,
        conditions: conditions,
        condition_logic: 'AND',
        start_date: form.start_date.value,
        end_date: form.end_date.value,
        max_trigger_count: parseInt(form.max_trigger_count.value)
      };

      const result = await api('/api/conditional-order', {
        method: 'POST',
        body: JSON.stringify(data)
      });

      if (result.success) {
        closeCreateModal();
        loadOrders();
      } else {
        alert('创建失败: ' + result.error);
      }
    }

    async function cancelOrder(id) {
      if (!confirm('确定要取消这个条件单吗？')) return;

      const result = await api(`/api/conditional-order/${id}/cancel`, {
        method: 'POST'
      });

      if (result.success) {
        loadOrders();
      } else {
        alert('取消失败: ' + result.error);
      }
    }

    // 初始化
    loadOrders();

    // 存储当前加载的条件单数据
    let ordersData = [];

    // 修改 loadOrders 保存数据
    const originalLoadOrders = loadOrders;
    loadOrders = async function() {
      const accountId = getAccountId();
      if (!accountId) {
        document.getElementById('order-list').innerHTML = '<div class="empty-state"><p class="empty-copy">请先选择账户</p></div>';
        return;
      }

      const url = currentFilter === 'all'
        ? `/api/conditional-order?account_id=${accountId}`
        : `/api/conditional-order?account_id=${accountId}&status=${currentFilter}`;

      const result = await api(url);
      const listEl = document.getElementById('order-list');

      if (!result.success || result.data.length === 0) {
        ordersData = [];
        listEl.innerHTML = '<div class="empty-state"><p class="empty-title">暂无条件单</p><p class="empty-copy">点击上方按钮创建</p></div>';
        return;
      }

      // 保存数据供导出使用
      ordersData = result.data;

      listEl.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>状态</th>
                <th>股票</th>
                <th>动作</th>
                <th>条件</th>
                <th>有效期</th>
                <th>触发</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${result.data.map(order => `
                <tr>
                  <td><span class="status-badge status-${order.status}">${getStatusText(order.status)}</span></td>
                  <td>${order.ts_code}<br><small style="color:var(--text-soft)">${order.stock_name}</small></td>
                  <td><span class="action-tag ${order.action === 'buy' ? 'buy' : 'sell'}">${order.action === 'buy' ? '买入' : '卖出'}</span></td>
                  <td>${formatConditions(order.conditions)}</td>
                  <td>${order.start_date} 至 ${order.end_date}</td>
                  <td>${order.trigger_count}/${order.max_trigger_count}</td>
                  <td>
                    <div class="action-buttons">
                      <button class="action-btn primary" onclick="exportToBacktest(${order.id})">导入回测</button>
                      <button class="action-btn" onclick="copyOrderData(${order.id})">复制</button>
                      ${order.status === 'pending' ? `
                        <button class="action-btn danger" onclick="cancelOrder(${order.id})">取消</button>
                      ` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    };

    // 导出条件单到回测系统
    function exportToBacktest(orderId) {
      const order = ordersData.find(o => o.id === orderId);
      if (!order) {
        alert('条件单数据未找到');
        return;
      }

      // 构建回测策略数据
      const exportData = {
        id: order.id,
        ts_code: order.ts_code,
        stock_name: order.stock_name,
        action: order.action,
        order_type: order.order_type,
        conditions: order.conditions,
        quantity: order.quantity,
        amount: order.amount,
        start_date: order.start_date,
        end_date: order.end_date,
        exportTime: new Date().toISOString()
      };

      // 存储到 localStorage 供回测系统读取
      localStorage.setItem('backtest_conditional_order', JSON.stringify(exportData));

      // 显示提示
      showToast('已准备导入回测系统，正在跳转...');

      // 跳转到回测页面
      setTimeout(() => {
        window.location.href = 'backtest.html?import=conditional&id=' + orderId;
      }, 800);
    }

    // 复制条件单数据
    async function copyOrderData(orderId) {
      const order = ordersData.find(o => o.id === orderId);
      if (!order) {
        alert('条件单数据未找到');
        return;
      }

      const copyText = JSON.stringify({
        stock: order.ts_code + ' ' + order.stock_name,
        action: order.action === 'buy' ? '买入' : '卖出',
        conditions: order.conditions,
        period: order.start_date + ' 至 ' + order.end_date
      }, null, 2);

      try {
        await navigator.clipboard.writeText(copyText);
        showToast('已复制到剪贴板');
      } catch (err) {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = copyText;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('已复制到剪贴板');
      }
    }

    // 显示提示
    function showToast(message) {
      let toast = document.querySelector('.export-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'export-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }
  </script>
</body>
</html>
