<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>条件单 | A股投资系统</title>
  <link rel="stylesheet" href="./pages/style.css" />
  <style>
    /* 页面特定样式 */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .top-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    .top-nav a.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .batch-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .batch-summary {
      color: var(--text-soft);
      font-size: 13px;
      white-space: nowrap;
    }

    .tabs-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tab-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
    }

    .search-box {
      min-width: min(100%, 280px);
      flex: 1 1 280px;
      max-width: 340px;
      min-height: 44px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.46);
      color: var(--text);
    }

    .search-box::placeholder {
      color: var(--text-faint);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-enabled {
      background: rgba(74, 222, 128, 0.15);
      color: var(--good);
    }

    .status-triggered {
      background: rgba(96, 165, 250, 0.15);
      color: var(--info);
    }

    .status-disabled,
    .status-expired {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-faint);
    }

    .action-tag {
      font-weight: 600;
    }

    .action-tag.buy { color: var(--bad); }
    .action-tag.sell { color: var(--good); }

    /* 操作按钮组 */
    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-soft);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .action-btn.primary {
      background: rgba(56, 189, 248, 0.15);
      border-color: rgba(56, 189, 248, 0.3);
      color: var(--accent);
    }

    .action-btn.primary:hover {
      background: rgba(56, 189, 248, 0.25);
    }

    .action-btn.danger {
      background: rgba(251, 113, 133, 0.15);
      border-color: rgba(251, 113, 133, 0.3);
      color: var(--bad);
    }

    .action-btn.danger:hover {
      background: rgba(251, 113, 133, 0.25);
    }

    .switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      inset: 0;
      cursor: pointer;
    }

    .switch-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      transition: background 0.2s ease;
    }

    .switch-slider::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s ease;
    }

    .switch input:checked + .switch-slider {
      background: rgba(74, 222, 128, 0.8);
    }

    .switch input:checked + .switch-slider::after {
      transform: translateX(20px);
    }

    .stock-cell {
      display: grid;
      gap: 4px;
    }

    .stock-name {
      font-weight: 600;
    }

    .stock-code {
      color: var(--text-soft);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .condition-copy {
      color: var(--text-soft);
      line-height: 1.5;
    }

    .table-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .checkbox-cell {
      width: 44px;
      text-align: center;
    }

    .table-checkbox,
    .select-all-checkbox {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-card {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(154, 178, 214, 0.14);
      background: rgba(255, 255, 255, 0.03);
    }

    .history-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .history-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--text);
      font-size: 14px;
    }

    .history-empty {
      padding: 24px 0;
      color: var(--text-soft);
      text-align: center;
    }

    .empty-copy strong {
      color: var(--text);
    }

    /* 导出提示 */
    .export-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.9);
      color: white;
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .export-toast.toast-success {
      background: rgba(34, 197, 94, 0.9);
    }

    .export-toast.toast-error {
      background: rgba(239, 68, 68, 0.92);
    }

    .export-toast.toast-info {
      background: rgba(56, 189, 248, 0.92);
    }

    .export-toast.show {
      opacity: 1;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--bg-accent);
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-soft);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
    }

    .form-input,
    .form-select {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.46);
      color: var(--text);
      font-size: 14px;
    }

    .form-select {
      cursor: pointer;
    }

    .form-input:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .form-actions .button {
      flex: 1;
    }

    .condition-item {
      display: grid;
      grid-template-columns: 1.1fr 1fr auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 10px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .condition-item select,
    .condition-item input,
    .condition-item textarea {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.6);
      color: var(--text);
      font-size: 13px;
    }

    .condition-item textarea {
      min-height: 96px;
      padding: 12px;
      resize: vertical;
      line-height: 1.5;
    }

    .condition-main {
      display: grid;
      gap: 10px;
    }

    .condition-params {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .condition-preview {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(56, 189, 248, 0.08);
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.5;
    }

    .condition-preview strong {
      color: var(--text);
    }

    .condition-side {
      display: grid;
      gap: 10px;
    }

    .condition-error {
      min-height: 18px;
      color: var(--bad);
      font-size: 12px;
      line-height: 1.5;
    }

    .condition-remove {
      min-height: 42px;
      padding: 0 12px;
      font-size: 12px;
    }

    .logic-row,
    .preview-panel,
    .import-panel {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(154, 178, 214, 0.14);
      background: rgba(255, 255, 255, 0.03);
    }

    .logic-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .logic-row .form-select {
      max-width: 160px;
    }

    .preview-panel {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .preview-panel strong {
      color: var(--text);
    }

    .import-panel {
      margin-bottom: 14px;
    }

    .import-panel h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .import-panel p {
      margin: 0 0 10px;
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.5;
    }

    .import-panel textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.46);
      color: var(--text);
      font-size: 13px;
      resize: vertical;
    }

    .import-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 860px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .condition-item {
        grid-template-columns: 1fr;
      }

      .condition-params {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .tabs-bar {
        flex-wrap: wrap;
      }

      .tab-btn {
        flex: 1;
        min-width: 80px;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <a href="./select.html">选股分析</a>
      <a href="./analysis.html">个股分析</a>
      <a href="./monitor-pool.html">监控池</a>
      <a href="./conditional-order.html" class="active">条件单</a>
      <a href="./backtest.html">回测系统</a>
      <a href="./portfolio.html">账户管理</a>
    </nav>

    <!-- 页面标题 -->
    <section class="hero">
      <p class="eyebrow">Conditional Order</p>
      <h1>条件单管理</h1>
      <p class="subtitle">创建和管理智能条件单，自动化您的交易策略</p>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <div class="status-row">
          <h2 class="section-title">条件单列表</h2>
          <button class="button" onclick="showCreateModal()">+ 新建条件单</button>
        </div>

        <div class="toolbar-row">
          <div class="toolbar-group">
            <div class="tabs-bar">
              <button class="tab-btn active" data-status="all" type="button">全部</button>
              <button class="tab-btn" data-status="enabled" type="button">启用</button>
              <button class="tab-btn" data-status="disabled" type="button">禁用</button>
              <button class="tab-btn" data-status="triggered" type="button">已触发</button>
            </div>
            <div class="batch-actions">
              <button class="action-btn" type="button" onclick="runBatchAction('enable')">批量启用</button>
              <button class="action-btn" type="button" onclick="runBatchAction('disable')">批量禁用</button>
              <button class="action-btn danger" type="button" onclick="runBatchAction('delete')">批量删除</button>
              <span class="batch-summary" id="batch-summary">未选择条件单</span>
            </div>
          </div>
          <input
            id="stock-search"
            class="search-box"
            type="search"
            placeholder="搜索股票名称或代码"
            aria-label="搜索股票名称或代码"
          >
        </div>

        <div id="order-list">
          <div class="empty-state">
            <p class="empty-title">暂无条件单</p>
            <p class="empty-copy">点击上方按钮创建条件单</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 创建条件单弹窗 -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="create-modal-title">新建条件单</h3>
        <button class="modal-close" onclick="closeCreateModal()">&times;</button>
      </div>
      <form id="create-form" onsubmit="createOrder(event)">
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">股票代码</label>
            <div class="stock-selector">
              <select id="stock-selector" class="form-select" onchange="onStockSelected()">
                <option value="">从监控池选择...</option>
              </select>
              <input type="text" id="stock-code-manual" class="form-input" name="ts_code" placeholder="或手动输入代码 300308.SZ" style="display:none;">
              <button type="button" class="button button-secondary" id="toggle-stock-btn" onclick="toggleStockInput()" style="margin-top:8px;">手动输入</button>
            </div>
          </div>
          <div class="form-field">
            <label class="form-label">股票名称</label>
            <input type="text" class="form-input" name="stock_name" id="stock-name-input" placeholder="中际旭创" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">交易动作</label>
            <select class="form-select" name="action" required>
              <option value="buy">买入</option>
              <option value="sell">卖出</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">条件单类型</label>
            <select class="form-select" name="order_type" required>
              <option value="price">价格条件</option>
              <option value="indicator">技术指标</option>
              <option value="capital">资金条件</option>
              <option value="composite">复合条件</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">交易数量/金额</label>
          <div class="form-row">
            <input type="number" class="form-input" name="quantity" placeholder="数量（股）" min="100" step="100">
            <input type="number" class="form-input" name="amount" placeholder="金额（元）">
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">仓位占比 (%)</label>
            <input type="number" class="form-input" name="position_pct" placeholder="建议仓位，如 8" min="0" max="100" step="0.1">
          </div>
          <div class="form-field">
            <label class="form-label">止损参考价</label>
            <input type="number" class="form-input" name="stop_loss_price" placeholder="导入策略止损价，可修改" min="0" step="0.01">
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">触发条件</label>
          <div class="import-panel">
            <h4>从分析报告导入</h4>
            <div class="form-row" style="margin-bottom: 10px;">
              <div class="form-field" style="margin-bottom: 0;">
                <label class="form-label">选择报告</label>
                <select id="report-selector" class="form-select" onchange="onReportSelected()">
                  <option value="">请先选择股票...</option>
                </select>
              </div>
              <div class="form-field" style="margin-bottom: 0;">
                <label class="form-label">风格建议</label>
                <select id="style-selector" class="form-select" onchange="onStyleSelected()">
                  <option value="balanced">稳健型 (Balanced)</option>
                  <option value="aggressive">激进型 (Aggressive)</option>
                  <option value="conservative">保守型 (Conservative)</option>
                </select>
              </div>
            </div>
            <div class="import-actions">
              <button type="button" class="button button-secondary" id="btn-import-report" onclick="importFromSelectedReport()" disabled>导入选定报告策略</button>
            </div>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
            <h4>手动粘贴 JSON 导入</h4>
            <p>粘贴 analysis report / strategy JSON，可自动映射为触发条件。</p>
            <textarea id="import-report-input" placeholder='{"stock_code":"300750.SZ","stock_name":"宁德时代","strategies":{"balanced":{"actions":[...]}}}'></textarea>
            <div class="import-actions">
              <button type="button" class="button button-secondary" onclick="importTriggersFromTextarea()">导入触发建议</button>
              <button type="button" class="button button-secondary" onclick="clearImportTextarea()">清空</button>
            </div>
          </div>
          <div class="logic-row">
            <label class="form-label" style="margin-bottom:0;">条件关系</label>
            <select class="form-select" name="condition_logic" onchange="updateConditionsPreview()">
              <option value="AND">全部满足 (AND)</option>
              <option value="OR">任一满足 (OR)</option>
            </select>
          </div>
          <div id="conditions-list">
          </div>
          <button type="button" class="button button-secondary" style="margin-top:10px;" onclick="addCondition()">+ 添加条件</button>
          <div class="preview-panel" id="conditions-preview">条件预览：请先配置触发条件</div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label class="form-label">有效期开始</label>
            <input type="date" class="form-input" name="start_date" required>
          </div>
          <div class="form-field">
            <label class="form-label">有效期结束</label>
            <input type="date" class="form-input" name="end_date" required>
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">最大触发次数</label>
          <input type="number" class="form-input" name="max_trigger_count" value="1" min="1" required>
        </div>

        <div class="form-actions">
          <button type="submit" class="button" id="create-submit-btn">创建</button>
          <button type="button" class="button button-secondary" onclick="closeCreateModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="history-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title" id="history-modal-title">执行历史</h3>
        <button class="modal-close" onclick="closeHistoryModal()">&times;</button>
      </div>
      <div id="history-content" class="history-list"></div>
    </div>
  </div>

  <script src="./public/js/factor-panel.js"></script>
  <script>
    const TRIGGER_TYPE_DEFS = {
      price_above: {
        label: '股价上穿',
        category: 'price',
        orderType: 'price',
        params: [
          { key: 'price', label: '目标价格', type: 'number', min: '0.01', step: '0.01', placeholder: '如 200' }
        ],
        preview: (params) => `股价上穿 ${formatNumber(params.price)} 元`
      },
      price_below: {
        label: '股价下穿',
        category: 'price',
        orderType: 'price',
        params: [
          { key: 'price', label: '目标价格', type: 'number', min: '0.01', step: '0.01', placeholder: '如 180' }
        ],
        preview: (params) => `股价下穿 ${formatNumber(params.price)} 元`
      },
      ma_golden_cross: {

    const IMPORT_PARAM_KEY = 'import';

    let currentFilter = 'all';
    let currentAccountId = null;

    let ordersData = [];

    function setEditingMode(order = null) {
      const titleEl = document.getElementById('create-modal-title');
      const submitEl = document.getElementById('create-submit-btn');

      submitEl.textContent = isEditing ? '保存修改' : '创建';
    }

    function formatNumber(value) {
      if (value === '' || value === null || value === undefined) {
        return '--';
      }
      const num = Number(value);
      if (!Number.isFinite(num)) {
        return String(value);
      }
      return num % 1 === 0 ? String(num) : num.toFixed(2).replace(/\.?0+$/, '');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function api(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const result = await response.json();
      if (!response.ok) {
        throw new Error(result.error || result.message || '请求失败');
      }
      return result;
    }

    function normalizeOrderStatus(status) {
      if (status === 'pending' || status === 'enabled') return 'enabled';
      if (status === 'cancelled' || status === 'disabled') return 'disabled';
      if (status === 'expired') return 'expired';
      return status || 'disabled';
    }

    function getAccountId() {
      currentAccountId = parseInt(localStorage.getItem('current_account_id'), 10);
      return Number.isFinite(currentAccountId) ? currentAccountId : null;
    }

    function getVisibleOrders() {
      return ordersData.filter((order) => {
        const status = normalizeOrderStatus(order.status);
        const matchesStatus = currentFilter === 'all' || status === currentFilter;
        const keyword = currentSearch.trim().toLowerCase();
        const matchesSearch = !keyword
          || String(order.ts_code || '').toLowerCase().includes(keyword)
          || String(order.stock_name || '').toLowerCase().includes(keyword);
        return matchesStatus && matchesSearch;
      });
    }

    async function loadOrders() {
      const accountId = getAccountId();
      const listEl = document.getElementById('order-list');

      if (!accountId) {
        ordersData = [];
        listEl.innerHTML = '<div class="empty-state"><p class="empty-title">未选择账户</p><p class="empty-copy">请先前往账户管理选择账户，再查看条件单列表。</p></div>';
        return;
      }

      try {
        const result = await api(`/api/conditional-order?account_id=${accountId}`);
        ordersData = Array.isArray(result.data)
          ? result.data.map((order) => ({ ...order, status: normalizeOrderStatus(order.status) }))
          : [];
        const validOrderIds = new Set(ordersData.map((order) => String(order.id)));
        selectedOrderIds = selectedOrderIds.filter((id) => validOrderIds.has(String(id)));
        renderOrders();
      } catch (error) {
        ordersData = [];
        selectedOrderIds = [];
        listEl.innerHTML = `<div class="empty-state"><p class="empty-title">加载失败</p><p class="empty-copy">${escapeHtml(error.message)}</p></div>`;
        updateBatchSummary();
      }
    }

    function renderOrders() {
      const listEl = document.getElementById('order-list');
      const visibleOrders = getVisibleOrders();

      if (ordersData.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><p class="empty-title">暂无条件单</p><p class="empty-copy"><strong>点击“新建条件单”</strong>，开始为股票设置自动触发规则。</p></div>';
        updateBatchSummary();
        return;
      }

      if (visibleOrders.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><p class="empty-title">没有匹配的条件单</p><p class="empty-copy">请调整状态筛选或搜索关键词。</p></div>';
        updateBatchSummary();
        return;
      }

      const visibleOrderIds = visibleOrders.map((order) => String(order.id));
      const selectedVisibleCount = visibleOrderIds.filter((id) => selectedOrderIds.includes(id)).length;
      const allVisibleSelected = visibleOrderIds.length > 0 && selectedVisibleCount === visibleOrderIds.length;

      listEl.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="checkbox-cell">
                  <input
                    type="checkbox"
                    class="select-all-checkbox"
                    ${allVisibleSelected ? 'checked' : ''}
                    onchange="toggleSelectAllVisible(this.checked)"
                  >
                </th>
                <th>股票名</th>
                <th>代码</th>
                <th>触发条件</th>
                <th>动作</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${visibleOrders.map((order) => {
                const normalizedStatus = normalizeOrderStatus(order.status);
                return `
                  <tr>
                    <td class="checkbox-cell">
                      <input
                        type="checkbox"
                        class="table-checkbox"
                        ${selectedOrderIds.includes(String(order.id)) ? 'checked' : ''}
                        onchange="toggleOrderSelection(${order.id}, this.checked)"
                      >
                    </td>
                    <td><span class="stock-name">${escapeHtml(order.stock_name || '-')}</span></td>
                    <td><span class="stock-code">${escapeHtml(order.ts_code || '-')}</span></td>
                    <td><span class="condition-copy">${escapeHtml(formatConditions(order.conditions))}</span></td>
                    <td><span class="action-tag ${order.action === 'buy' ? 'buy' : 'sell'}">${order.action === 'buy' ? '买入' : '卖出'}</span></td>
                    <td><span class="status-badge status-${normalizedStatus}">${getStatusText(normalizedStatus)}</span></td>
                    <td>
                      <div class="table-actions">
                        ${normalizedStatus === 'triggered' ? '<span class="action-btn">已完成</span>' : `
                          <label class="switch" title="${normalizedStatus === 'enabled' ? '禁用条件单' : '启用条件单'}">
                            <input type="checkbox" ${normalizedStatus === 'enabled' ? 'checked' : ''} onchange="toggleOrder(${order.id})">
                            <span class="switch-slider"></span>
                          </label>
                        `}
                        <button class="action-btn primary" type="button" onclick="importToBacktest(${order.id})">导入回测</button>
                        <button class="action-btn" type="button" onclick="editOrder(${order.id})">编辑</button>
                        <button class="action-btn" type="button" onclick="showHistory(${order.id})">查看历史</button>
                        <button class="action-btn danger" type="button" onclick="deleteOrder(${order.id})">删除</button>
                      </div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
      updateBatchSummary(visibleOrders.length);
    }

    function getStatusText(status) {
      const map = {
        enabled: '启用',
        pending: '启用',
        disabled: '禁用',
        cancelled: '禁用',
        triggered: '已触发',
        expired: '已结束'
      };
      return map[status] || status;
    }

    function formatConditions(conditions) {
      if (!conditions || conditions.length === 0) return '-';
      return conditions.map(formatConditionText).join('、');
    }

    function formatConditionText(condition) {
      if (condition?.preview) {
        return condition.preview;
      }
      if (condition?.trigger_type && TRIGGER_TYPE_DEFS[condition.trigger_type]) {
        const preview = buildConditionPreview(condition.trigger_type, condition.params || {});
        if (preview) {
          return preview;
        }
      }
      if (condition?.type && condition?.operator && condition?.value !== undefined) {
        const fieldMap = {
          price: '股价',
          pct_change: '涨跌幅',
          volume_ratio: '量比',
          rsi: 'RSI',
          macd_cross: 'MACD',
          main_force_net: '主力净额',
          pe: 'PE'
        };
        return `${fieldMap[condition.type] || condition.type}${condition.operator}${condition.value}`;
      }
      return '未识别条件';
    }

    function filterOrders(status, buttonEl) {
      currentFilter = status;
      document.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));
      if (buttonEl) {
        buttonEl.classList.add('active');
      }
      loadOrders();
    }

    function getDefaultTriggerType() {
      return 'price_above';
    }

    function normalizeNumericParam(value) {
      if (typeof value === 'number' && Number.isFinite(value)) {
        return value;
      }
      const trimmed = String(value ?? '').trim();
      if (!trimmed) {
        return '';
      }
      const numeric = Number(trimmed);
      return Number.isFinite(numeric) ? numeric : trimmed;
    }

    function buildConditionPreview(triggerType, params) {
      const def = TRIGGER_TYPE_DEFS[triggerType];
      if (!def) {
        return '';
      }
      try {
        return def.preview(params || {});
      } catch (error) {
        return '';
      }
    }

    function hasConditionInput(config) {
      const params = config?.params || {};
      return Object.values(params).some((value) => String(value ?? '').trim() !== '');
    }

    function createLegacyCompatibleCondition(triggerType, params) {
      const normalized = {};
      Object.entries(params || {}).forEach(([key, value]) => {
        normalized[key] = normalizeNumericParam(value);
      });

      const base = {
        trigger_type: triggerType,
        category: TRIGGER_TYPE_DEFS[triggerType]?.category || 'price',
        params: normalized,
        preview: buildConditionPreview(triggerType, normalized)
      };

      switch (triggerType) {
        case 'price_above':
          return { ...base, type: 'price', field: 'price', operator: '>=', value: normalized.price, unit: '元' };
        case 'price_below':
          return { ...base, type: 'price', field: 'price', operator: '<=', value: normalized.price, unit: '元' };
        case 'ma_golden_cross':
          return { ...base, type: 'indicator', field: 'ma_cross', operator: 'golden_cross', value: `${normalized.ma_short}/${normalized.ma_long}` };
        case 'ma_death_cross':
          return { ...base, type: 'indicator', field: 'ma_cross', operator: 'death_cross', value: `${normalized.ma_short}/${normalized.ma_long}` };
        case 'rsi_overbought':
          return { ...base, type: 'indicator', field: 'rsi', operator: '>=', value: normalized.threshold };
        case 'rsi_oversold':
          return { ...base, type: 'indicator', field: 'rsi', operator: '<=', value: normalized.threshold };
        case 'volume_ratio_above':
          return { ...base, type: 'indicator', field: 'volume_ratio', operator: '>=', value: normalized.ratio };
        case 'macd_bullish':
          return { ...base, type: 'indicator', field: 'macd_cross', operator: '>=', value: normalized.signal };
        case 'macd_bearish':
          return { ...base, type: 'indicator', field: 'macd_cross', operator: '<=', value: normalized.signal };
        case 'pe_low':
          return { ...base, type: 'fundamental', field: 'pe', operator: '<=', value: normalized.pe };
        case 'pe_high':
          return { ...base, type: 'fundamental', field: 'pe', operator: '>=', value: normalized.pe };
        case 'daily_gain':
          return { ...base, type: 'pct_change', field: 'pct_change', operator: '>=', value: normalized.percent, unit: '%' };
        case 'daily_loss':
          return { ...base, type: 'pct_change', field: 'pct_change', operator: '<=', value: normalized.percent ? -Math.abs(normalized.percent) : normalized.percent, unit: '%' };
        case 'main_force_net_inflow':
          return { ...base, type: 'fundamental', field: 'main_force_net', operator: '>=', value: normalized.amount };
        case 'main_force_net_outflow':
          return { ...base, type: 'fundamental', field: 'main_force_net', operator: '<=', value: normalized.amount ? -Math.abs(normalized.amount) : normalized.amount };
        case 'factor_score':
          return {
            ...base,
            type: 'composite',
            field: 'factor_score',
            operator: params.comparison === 'below' ? '<=' : '>=',
            value: normalized.score_threshold,
            factor_weights: params.factor_weights || {}
          };
        default:
          return base;
      }
    }

    function validateTriggerConfig(config) {
      const def = TRIGGER_TYPE_DEFS[config?.trigger_type];
      if (!def) {
        return { valid: false, error: '存在不支持的触发类型' };
      }

      const params = config.params || {};
      for (const paramDef of def.params) {
        const rawValue = params[paramDef.key];
        const value = normalizeNumericParam(rawValue);
        if (value === '' || !Number.isFinite(Number(value))) {
          return { valid: false, error: `${def.label} 的 ${paramDef.label} 不能为空` };
        }

        const num = Number(value);
        if (paramDef.min !== undefined && num < Number(paramDef.min)) {
          return { valid: false, error: `${def.label} 的 ${paramDef.label} 不能小于 ${paramDef.min}` };
        }
        if (paramDef.max !== undefined && num > Number(paramDef.max)) {
          return { valid: false, error: `${def.label} 的 ${paramDef.label} 不能大于 ${paramDef.max}` };
        }
      }

      if (['ma_golden_cross', 'ma_death_cross'].includes(config.trigger_type)) {
        const shortMa = Number(params.ma_short);
        const longMa = Number(params.ma_long);
        if (shortMa >= longMa) {
          return { valid: false, error: 'MA 条件要求短期均线必须小于长期均线' };
        }
      }

      return { valid: true };
    }

    function normalizeTriggerConfig(condition = {}) {
      if (!condition || Object.keys(condition).length === 0) {
        return createLegacyCompatibleCondition(getDefaultTriggerType(), {});
      }
      if (condition.trigger_type && TRIGGER_TYPE_DEFS[condition.trigger_type]) {
        return createLegacyCompatibleCondition(condition.trigger_type, condition.params || {});
      }
      return mapImportedCondition(condition);
    }

    function createConditionRow(condition = {}) {
      const normalizedCondition = normalizeTriggerConfig(condition);
      const triggerType = normalizedCondition.trigger_type || getDefaultTriggerType();
      const def = TRIGGER_TYPE_DEFS[triggerType];
      const row = document.createElement('div');
      row.className = 'condition-item';
      row.innerHTML = `
        <div class="condition-main">
          <select class="cond-trigger-type" onchange="handleConditionTypeChange(this)">
            ${Object.entries(TRIGGER_TYPE_DEFS).map(([key, item]) => `
              <option value="${key}">${item.label}</option>
            `).join('')}
          </select>
          <div class="condition-params"></div>
        </div>
        <div class="condition-side">
          <div class="condition-preview"><strong>条件预览：</strong><span class="condition-preview-text"></span></div>
          <div class="condition-error"></div>
        </div>
        <button type="button" class="button button-danger condition-remove" onclick="removeCondition(this)">删除</button>
      `;

      row.querySelector('.cond-trigger-type').value = triggerType;
      renderConditionParams(row, triggerType, normalizedCondition.params || {});
      updateConditionPreview(row);
      return row;
    }

    function renderConditionParams(row, triggerType, params = {}) {
      const def = TRIGGER_TYPE_DEFS[triggerType] || TRIGGER_TYPE_DEFS[getDefaultTriggerType()];
      const paramsEl = row.querySelector('.condition-params');

      // 特殊处理：多因子评分条件
      if (triggerType === 'factor_score') {
        const scoreThreshold = params.score_threshold ?? 3.5;
        const comparison = params.comparison ?? 'above';

        paramsEl.innerHTML = `
          <div>
            <label class="form-label">评分阈值 (0-5分)</label>
            <input
              type="number"
              class="cond-param-input"
              data-param-key="score_threshold"
              placeholder="如 3.5"
              min="0"
              max="5"
              step="0.1"
              value="${scoreThreshold}"
              oninput="updateConditionPreview(this.closest('.condition-item'))"
            >
          </div>
          <div>
            <label class="form-label">触发条件</label>
            <select
              class="cond-param-input"
              data-param-key="comparison"
              onchange="updateConditionPreview(this.closest('.condition-item'))"
            >
              <option value="above" ${comparison === 'below' ? '' : 'selected'}>评分高于阈值</option>
              <option value="below" ${comparison === 'below' ? 'selected' : ''}>评分低于阈值</option>
            </select>
          </div>
        `;

        // 添加因子配置面板
        const existingPanel = row.querySelector('.factor-panel-wrapper');
        if (!existingPanel && window.FactorPanel) {
          const panelWrapper = document.createElement('div');
          panelWrapper.className = 'factor-panel-wrapper';
          panelWrapper.style.gridColumn = '1 / -1';
          panelWrapper.style.marginTop = '10px';
          row.querySelector('.condition-main').appendChild(panelWrapper);

          const stockCode = document.querySelector('[name="ts_code"]')?.value;
          window.FactorPanel.init(panelWrapper, {
            stockCode,
            initialFactors: params.factor_weights
          });
        }
        return;
      }

      paramsEl.innerHTML = def.params.map((param) => {
        // 支持下拉选择类型
        if (param.type === 'select' && param.options) {
          return `
            <div>
              <label class="form-label">${escapeHtml(param.label)}</label>
              <select
                class="cond-param-input"
                data-param-key="${escapeHtml(param.key)}"
                onchange="updateConditionPreview(this.closest('.condition-item'))"
              >
                ${param.options.map(opt => `
                  <option value="${opt.value}" ${params[param.key] === opt.value ? 'selected' : ''}>${opt.label}</option>
                `).join('')}
              </select>
            </div>
          `;
        }

        return `
          <div>
            <label class="form-label">${escapeHtml(param.label)}</label>
            <input
              type="${param.type}"
              class="cond-param-input"
              data-param-key="${escapeHtml(param.key)}"
              placeholder="${escapeHtml(param.placeholder || '')}"
              ${param.min !== undefined ? `min="${param.min}"` : ''}
              ${param.max !== undefined ? `max="${param.max}"` : ''}
              ${param.step !== undefined ? `step="${param.step}"` : ''}
              value="${escapeHtml(params[param.key] ?? '')}"
              oninput="updateConditionPreview(this.closest('.condition-item'))"
            >
          </div>
        `;
      }).join('');
    }

    function handleConditionTypeChange(selectEl) {
      const row = selectEl.closest('.condition-item');
      renderConditionParams(row, selectEl.value, {});
      updateConditionPreview(row);
      updateConditionsPreview();
    }

    function readConditionRowConfig(row) {
      const triggerType = row.querySelector('.cond-trigger-type').value;
      const params = {};
      row.querySelectorAll('.cond-param-input').forEach((input) => {
        if (input.type === 'number') {
          params[input.dataset.paramKey] = normalizeNumericParam(input.value);
        } else {
          params[input.dataset.paramKey] = input.value;
        }
      });

      // 特殊处理：多因子评分条件 - 收集因子权重
      if (triggerType === 'factor_score' && window.FactorPanel) {
        const factorConfig = window.FactorPanel.getFactorConfig();
        params.factor_weights = factorConfig.factors;
        params.total_weight = factorConfig.totalWeight;

        const condition = createLegacyCompatibleCondition(triggerType, params);
        condition.params = params;
        condition.factorConfig = factorConfig;
        return condition;
      }

      return createLegacyCompatibleCondition(triggerType, params);
    }

    function updateConditionPreview(row) {
      if (!row) {
        return;
      }
      const config = readConditionRowConfig(row);
      const hasInput = hasConditionInput(config);
      const previewText = hasInput ? formatConditionText(config) : '';
      row.querySelector('.condition-preview-text').textContent = previewText || '请填写参数';
      const validation = hasInput ? validateTriggerConfig(config) : { valid: true };
      row.querySelector('.condition-error').textContent = validation.valid ? '' : validation.error;
      updateConditionsPreview();
    }

    function normalizeTsCode(value) {
      return String(value || '').trim().toUpperCase();
    }

    function validateEditableConditions(conditions) {
      if (!Array.isArray(conditions) || conditions.length === 0) {
        return { valid: false, error: '请至少填写一个触发条件' };
      }

      for (const condition of conditions) {
        const validation = validateTriggerConfig(condition);
        if (!validation.valid) {
          return validation;
        }
      }

      return { valid: true };
    }

    function collectFormConditions() {
      const conditions = [];
      document.querySelectorAll('.condition-item').forEach(row => {
        const config = readConditionRowConfig(row);
        if (hasConditionInput(config)) {
          conditions.push(config);
        }
      });
      return conditions;
    }

    function inferOrderTypeFromConditions(conditions) {
      if (!Array.isArray(conditions) || conditions.length === 0) {
        return 'price';
      }
      if (conditions.length > 1) {
        return 'composite';
      }

      const [condition] = conditions;
      return TRIGGER_TYPE_DEFS[condition.trigger_type]?.orderType || 'composite';
    }

    async function fetchStockInfo(query) {
      const response = await fetch(`/api/stock/search?q=${encodeURIComponent(query)}`);
      const result = await response.json();
      return Array.isArray(result.data) ? result.data[0] || null : null;
    }

    function clearImportParam() {
      const url = new URL(window.location.href);
      if (!url.searchParams.has(IMPORT_PARAM_KEY)) {
        return;
      }
      url.searchParams.delete(IMPORT_PARAM_KEY);
      window.history.replaceState({}, '', url.pathname + url.search + url.hash);
    }

    function parseImportPayload(rawImport) {
      let decoded = rawImport;
      try {
        decoded = decodeURIComponent(rawImport);
      } catch (error) {
        decoded = rawImport;
      }

      let payload;
      try {
        payload = JSON.parse(decoded);
      } catch (error) {
        throw new Error('导入数据不是有效 JSON');
      }

      if (!payload || typeof payload !== 'object') {
        throw new Error('导入数据格式无效');
      }

      const stockCode = normalizeTsCode(payload.stock_code || payload.ts_code);
      const stockName = String(payload.stock_name || '').trim();
      const strategy = payload.strategy || payload.strategies?.balanced || payload.strategies?.aggressive || payload.strategies?.conservative;

      if (!stockCode || !stockName || !strategy || typeof strategy !== 'object') {
        throw new Error('导入数据缺少股票或策略信息');
      }
      if (!Array.isArray(strategy.actions) || strategy.actions.length === 0) {
        throw new Error('导入策略缺少可用动作');
      }

      return {
        stockCode,
        stockName,
        stopLoss: payload.stop_loss,
        strategy
      };
    }

    function mapImportedCondition(condition) {
      const field = typeof condition?.field === 'string' ? condition.field.trim().toLowerCase() : '';
      const operator = typeof condition?.operator === 'string' ? condition.operator.trim().toLowerCase() : '';
      const value = normalizeNumericParam(condition?.value);
      const params = condition?.params && typeof condition.params === 'object' ? condition.params : {};

      if (condition?.trigger_type && TRIGGER_TYPE_DEFS[condition.trigger_type]) {
        return createLegacyCompatibleCondition(condition.trigger_type, condition.params || {});
      }

      if (field === 'price' || condition?.type === 'price') {
        if (operator === '>=' || operator === '>') {
          return createLegacyCompatibleCondition('price_above', { price: value });
        }
        return createLegacyCompatibleCondition('price_below', { price: value });
      }

      if (field === 'rsi') {
        if (operator === '>=' || operator === '>') {
          return createLegacyCompatibleCondition('rsi_overbought', { threshold: value });
        }
        return createLegacyCompatibleCondition('rsi_oversold', { threshold: value });
      }

      if (field === 'volume_ratio') {
        return createLegacyCompatibleCondition('volume_ratio_above', { ratio: value });
      }

      if (field === 'macd' || field === 'macd_cross') {
        if (operator === '<=' || operator === '<' || String(value).startsWith('-')) {
          return createLegacyCompatibleCondition('macd_bearish', { signal: value });
        }
        return createLegacyCompatibleCondition('macd_bullish', { signal: value });
      }

      if (field === 'main_force_net') {
        if (operator === '<=' || operator === '<' || Number(value) < 0) {
          return createLegacyCompatibleCondition('main_force_net_outflow', { amount: Math.abs(Number(value)) || value });
        }
        return createLegacyCompatibleCondition('main_force_net_inflow', { amount: value });
      }

      if (field === 'pe' || field === 'pe_percentile' || condition?.type === 'fundamental') {
        if (operator === '>=' || operator === '>') {
          return createLegacyCompatibleCondition('pe_high', { pe: value });
        }
        return createLegacyCompatibleCondition('pe_low', { pe: value });
      }

      if (field === 'pct_change' || condition?.type === 'pct_change') {
        const percent = Math.abs(Number(value));
        if (Number(value) < 0 || operator === '<=' || operator === '<') {
          return createLegacyCompatibleCondition('daily_loss', { percent });
        }
        return createLegacyCompatibleCondition('daily_gain', { percent });
      }

      if (field === 'ma_cross') {
        const [shortValue, longValue] = String(value || '').split('/').map(Number);
        if (operator === 'death_cross') {
          return createLegacyCompatibleCondition('ma_death_cross', {
            ma_short: params.ma_short ?? shortValue,
            ma_long: params.ma_long ?? longValue
          });
        }
        return createLegacyCompatibleCondition('ma_golden_cross', {
          ma_short: params.ma_short ?? shortValue,
          ma_long: params.ma_long ?? longValue
        });
      }

      if (field === 'factor_score' || condition?.type === 'composite') {
        return createLegacyCompatibleCondition('factor_score', {
          score_threshold: condition.value || condition.params?.score_threshold || 3.5,
          comparison: (operator === '<=' || operator === '<') ? 'below' : 'above',
          factor_weights: condition.factor_weights || condition.params?.factor_weights || {}
        });
      }

      throw new Error(`存在不支持的触发字段: ${condition?.field || condition?.type || 'unknown'}`);
    }

    function normalizeImportedConditions(importedConditions) {
      if (!Array.isArray(importedConditions) || importedConditions.length === 0) {
        throw new Error('导入策略未包含触发条件');
      }

      return importedConditions.map((condition) => {
        return mapImportedCondition(condition);
      });
    }

    function pickImportAction(strategy) {
      const action = strategy.actions.find(item =>
        ['buy', 'sell'].includes(item?.action_type) &&
        Array.isArray(item?.trigger_conditions) &&
        item.trigger_conditions.length > 0
      );

      if (!action) {
        throw new Error('导入策略中没有可创建条件单的买卖动作');
      }

      return action;
    }

    async function handleImportFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const rawImport = params.get(IMPORT_PARAM_KEY);
      const rawBatch = params.get('batch');
      
      // 处理批量创建模式
      if (rawBatch) {
        try {
          const batchData = JSON.parse(decodeURIComponent(rawBatch));
          if (batchData.mode === 'batch' && batchData.stocks) {
            showBatchCreateModal(batchData);
            clearBatchParam();
            return;
          }
        } catch (error) {
          console.error('解析批量创建参数失败:', error);
          showToast('批量创建参数解析失败', 'error');
        }
      }
      
      if (!rawImport) {
        return;
      }

      try {
        const parsed = parseImportPayload(rawImport);
        const stockInfo = await fetchStockInfo(parsed.stockCode);
        if (!stockInfo || normalizeTsCode(stockInfo.ts_code) !== parsed.stockCode) {
          throw new Error(`未找到股票 ${parsed.stockCode}`);
        }

        const action = pickImportAction(parsed.strategy);
        const conditions = normalizeImportedConditions(action.trigger_conditions);
        const validation = validateEditableConditions(conditions);
        if (!validation.valid) {
          throw new Error(validation.error);
        }

        showCreateModal({ allowWithoutAccount: true });

        const form = getCreateForm();
        form.ts_code.value = stockInfo.ts_code || parsed.stockCode;
        form.stock_name.value = stockInfo.name || parsed.stockName;
        form.action.value = action.action_type;
        form.order_type.value = inferOrderTypeFromConditions(conditions);
        form.condition_logic.value = action.trigger_logic || 'AND';
        form.position_pct.value = action.position_percent ?? '';
        form.stop_loss_price.value = action.stop_loss ?? parsed.stopLoss ?? '';
        resetConditions(conditions);

        clearImportParam();
        showToast(`已导入 ${form.stock_name.value} 策略，请确认后创建条件单`, 'success');
      } catch (error) {
        clearImportParam();
        showToast(`导入失败：${error.message}`, 'error');
      }
    }

    function clearBatchParam() {
      const url = new URL(window.location);
      url.searchParams.delete('batch');
      window.history.replaceState({}, '', url);
    }

    async function executeBatchCreate() {
      const stocks = window.batchCreateStocks || [];
      if (stocks.length === 0) {
        showToast('没有股票数据', 'error');
        return;
      }

      const accountId = getAccountId();
      if (!accountId) {
        showToast('请先选择账户', 'error');
        return;
      }

      // 收集批量配置
      const action = document.getElementById('batch-action').value;
      const orderType = document.getElementById('batch-order-type').value;
      const positionPct = document.getElementById('batch-position-pct').value;
      const quantity = document.getElementById('batch-quantity').value;
      const startDate = document.getElementById('batch-start-date').value;
      const endDate = document.getElementById('batch-end-date').value;

      // 收集条件
      const conditions = [];
      const conditionRows = document.querySelectorAll('#batch-conditions-list .condition-row');
      conditionRows.forEach(row => {
        const type = row.querySelector('select').value;
        const value = row.querySelector('input').value;
        if (value) {
          conditions.push({ type, value });
        }
      });

      if (conditions.length === 0) {
        showToast('请至少添加一个触发条件', 'error');
        return;
      }

      // 批量创建
      const batchSize = stocks.length;
      let successCount = 0;
      let failCount = 0;

      for (const stock of stocks) {
        const orderData = {
          account_id: accountId,
          ts_code: stock.ts_code,
          stock_name: stock.stock_name,
          action,
          order_type: orderType,
          conditions,
          position_pct: positionPct ? parseFloat(positionPct) : null,
          quantity: quantity ? parseInt(quantity) : null,
          start_date: startDate,
          end_date: endDate
        };

        try {
          const response = await fetch('/api/conditional-order/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(orderData)
          });
          const result = await response.json();
          if (result.success) {
            successCount++;
          } else {
            failCount++;
            console.error(`创建失败 ${stock.ts_code}:`, result.error);
          }
        } catch (error) {
          failCount++;
          console.error(`创建异常 ${stock.ts_code}:`, error);
        }
      }

      closeBatchCreateModal();
      showToast(`批量创建完成：成功 ${successCount} 只，失败 ${failCount} 只`, successCount === batchSize ? 'success' : 'warning');
      
      // 刷新列表
      loadOrders();
    }

    async function createOrder(e) {
      e.preventDefault();
      const form = e.target;
      const accountId = getAccountId();
      if (!accountId) {
        showToast('请先创建并选择账户', 'error');
        return;
      }

      const tsCode = normalizeTsCode(form.ts_code.value);
      const stockName = form.stock_name.value.trim();
      const conditions = collectFormConditions();
      const condValidation = validateEditableConditions(conditions);
      if (!condValidation.valid) {
        showToast(condValidation.error, 'error');
        return;
      }

      // 提取因子权重配置（如果存在 factor_score 条件）
      let factorWeights = null;
      for (const condition of conditions) {
        if (condition.trigger_type === 'factor_score' && condition.params?.factor_weights) {
          factorWeights = {
            factors: condition.params.factor_weights,
            totalWeight: condition.params.total_weight || 100
          };
          break;
        }
      }

      const positionPct = form.position_pct.value === ''
        ? null
        : Number(form.position_pct.value);
      if (positionPct !== null && (!Number.isFinite(positionPct) || positionPct < 0 || positionPct > 100)) {
        showToast('仓位占比需在 0-100 之间', 'error');
        return;
      }

      if (!tsCode || !stockName) {
        showToast('股票代码和名称不能为空', 'error');
        return;
      }

      const data = {
        account_id: accountId,
        ts_code: tsCode,
        stock_name: stockName,
        action: form.action.value,
        order_type: inferOrderTypeFromConditions(conditions),
        quantity: form.quantity.value ? parseInt(form.quantity.value) : null,
        amount: form.amount.value ? parseFloat(form.amount.value) : null,
        position_pct: positionPct,
        conditions: conditions,
        condition_logic: form.condition_logic.value,
        start_date: form.start_date.value,
        end_date: form.end_date.value,
        max_trigger_count: parseInt(form.max_trigger_count.value),
        factor_weights: factorWeights
      };

      const isEditing = Boolean(editingOrderId);
      const requestUrl = isEditing ? `/api/conditional-order/${editingOrderId}` : '/api/conditional-order';
      const requestMethod = isEditing ? 'PUT' : 'POST';

      const result = await api(requestUrl, {
        method: requestMethod,
        body: JSON.stringify(data)
      });

      if (result.success) {
        closeCreateModal();
        resetCreateForm();
        loadOrders();
        showToast(isEditing ? '条件单更新成功' : '条件单创建成功', 'success');
      } else {
        showToast((isEditing ? '更新失败: ' : '创建失败: ') + result.error, 'error');
      }
    }

    async function toggleOrder(id) {
      try {
        const result = await api(`/api/conditional-order/${id}/toggle`, {
          method: 'PUT'
        });

        await loadOrders();
        showToast(result.data?.status === 'enabled' ? '条件单已启用' : '条件单已禁用', 'success');
      } catch (error) {
        showToast('切换失败: ' + error.message, 'error');
      }
    }

    async function importToBacktest(id) {
      try {
        // 先获取条件单详情
        const result = await api(`/api/conditional-order/${id}`);
        if (!result.success) {
          showToast('获取条件单失败：' + (result.error || '未知错误'), 'error');
          return;
        }

        const order = result.data;
        
        // 检查条件单是否有效
        if (!order.ts_code) {
          showToast('该条件单没有关联股票代码，无法导入回测', 'error');
          return;
        }

        // 跳转到回测页面并传递条件单 ID
        showToast('已准备导入回测系统，正在跳转...', 'success');
        setTimeout(() => {
          window.location.href = 'backtest.html?import=conditional&id=' + id;
        }, 800);
      } catch (error) {
        showToast('导入失败：' + error.message, 'error');
      }
    }

    async function deleteOrder(id) {
      if (!confirm('确定要删除这个条件单吗？删除后无法恢复。')) {
        return;
      }

      try {
        await api(`/api/conditional-order/${id}`, {
          method: 'DELETE'
        });

        selectedOrderIds = selectedOrderIds.filter((item) => item !== String(id));
        await loadOrders();
        showToast('条件单已删除', 'success');
      } catch (error) {
        showToast('删除失败: ' + error.message, 'error');
      }
    }

    async function setOrderEnabledState(id, enable) {
      const order = ordersData.find((item) => item.id === id);
      if (!order) {
        return false;
      }
      const normalizedStatus = normalizeOrderStatus(order.status);
      const shouldEnable = Boolean(enable);
      if (['triggered', 'expired'].includes(normalizedStatus)) {
        return false;
      }
      if ((shouldEnable && normalizedStatus === 'enabled') || (!shouldEnable && normalizedStatus === 'disabled')) {
        return false;
      }
      await api(`/api/conditional-order/${id}/toggle`, { method: 'PUT' });
      return true;
    }

    async function runBatchAction(action) {
      const selectedIds = getSelectedOrderIds();
      if (!selectedIds.length) {
        showToast('请先选择至少一个条件单', 'info');
        return;
      }

      const actionTextMap = {
        enable: '批量启用',
        disable: '批量禁用',
        delete: '批量删除'
      };

      if (!confirm(`确定要${actionTextMap[action]}这 ${selectedIds.length} 条条件单吗？`)) {
        return;
      }

      try {
        let affectedCount = 0;
        for (const id of selectedIds) {
          if (action === 'enable') {
            if (await setOrderEnabledState(Number(id), true)) {
              affectedCount += 1;
            }
          } else if (action === 'disable') {
            if (await setOrderEnabledState(Number(id), false)) {
              affectedCount += 1;
            }
          } else if (action === 'delete') {
            await api(`/api/conditional-order/${id}`, { method: 'DELETE' });
            affectedCount += 1;
          }
        }
        selectedOrderIds = [];
        await loadOrders();
        showToast(`${actionTextMap[action]}完成，实际处理 ${affectedCount} 条`, 'success');
      } catch (error) {
        showToast(`${actionTextMap[action]}失败: ${error.message}`, 'error');
      }
    }

    async function editOrder(id) {
      const order = ordersData.find((item) => item.id === id);
      if (!order) {
        showToast('条件单数据未找到', 'error');
        return;
      }

      showCreateModal({ preserveValues: true });
      setEditingMode(order);

      const form = getCreateForm();
      form.ts_code.value = order.ts_code || '';
      form.stock_name.value = order.stock_name || '';
      form.action.value = order.action || 'buy';
      form.order_type.value = order.order_type || inferOrderTypeFromConditions(order.conditions || []);
      form.quantity.value = order.quantity ?? '';
      form.amount.value = order.amount ?? '';
      form.position_pct.value = order.position_pct ?? '';
      form.condition_logic.value = order.condition_logic || 'AND';
      form.start_date.value = order.start_date || '';
      form.end_date.value = order.end_date || '';
      form.max_trigger_count.value = order.max_trigger_count ?? '1';
      resetConditions(order.conditions?.length ? order.conditions : [{}]);
      clearImportTextarea();
      updateConditionsPreview();
    }

    function formatTradeTime(value) {
      if (!value) {
        return '--';
      }
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) {
        return String(value);
      }
      return parsed.toLocaleString('zh-CN', { hour12: false });
    }

    async function showHistory(id) {
      const order = ordersData.find((item) => item.id === id);
      const contentEl = document.getElementById('history-content');
      const titleEl = document.getElementById('history-modal-title');
      titleEl.textContent = order ? `${order.stock_name} 执行历史` : '执行历史';
      contentEl.innerHTML = '<div class="history-empty">正在加载执行历史...</div>';
      document.getElementById('history-modal').classList.add('show');

      try {
        const result = await api(`/api/conditional-order/${id}/history`);
        const history = Array.isArray(result.data) ? result.data : [];
        if (!history.length) {
          contentEl.innerHTML = '<div class="history-empty">暂无触发记录</div>';
          return;
        }

        contentEl.innerHTML = history.map((item) => `
          <div class="history-card">
            <div class="history-meta">
              <span>${escapeHtml(formatTradeTime(item.trade_date))}</span>
              <span class="status-badge status-triggered">已执行</span>
              <span>${item.action === 'buy' ? '买入' : '卖出'}</span>
            </div>
            <div class="history-detail">
              <span>触发价格：${escapeHtml(formatNumber(item.price))} 元</span>
              <span>数量：${escapeHtml(formatNumber(item.quantity))} 股</span>
              <span>成交额：${escapeHtml(formatNumber(item.amount))} 元</span>
              <span>备注：${escapeHtml(item.remark || '-')}</span>
            </div>
          </div>
        `).join('');
      } catch (error) {
        contentEl.innerHTML = `<div class="history-empty">${escapeHtml(error.message)}</div>`;
      }
    }

    async function cancelOrder(id) {
      if (!confirm('确定要取消这个条件单吗？')) return;

      const result = await api(`/api/conditional-order/${id}/cancel`, {
        method: 'POST'
      });

      if (result.success) {
        loadOrders();
        showToast('条件单已取消', 'success');
      } else {
        showToast('取消失败: ' + result.error, 'error');
      }
    }

    // 导出条件单到回测系统
    function exportToBacktest(orderId) {
      const order = ordersData.find(o => o.id === orderId);
      if (!order) {
        alert('条件单数据未找到');
        return;
      }

      // 构建回测策略数据
      const exportData = {
        id: order.id,
        ts_code: order.ts_code,
        stock_name: order.stock_name,
        action: order.action,
        order_type: order.order_type,
        conditions: order.conditions,
        quantity: order.quantity,
        amount: order.amount,
        start_date: order.start_date,
        end_date: order.end_date,
        exportTime: new Date().toISOString()
      };

      // 存储到 localStorage 供回测系统读取
      localStorage.setItem('backtest_conditional_order', JSON.stringify(exportData));

      // 显示提示
      showToast('已准备导入回测系统，正在跳转...');

      // 跳转到回测页面
      setTimeout(() => {
        window.location.href = 'backtest.html?import=conditional&id=' + orderId;
      }, 800);
    }

    // 复制条件单数据
    async function copyOrderData(orderId) {
      const order = ordersData.find(o => o.id === orderId);
      if (!order) {
        alert('条件单数据未找到');
        return;
      }

      const copyText = JSON.stringify({
        stock: order.ts_code + ' ' + order.stock_name,
        action: order.action === 'buy' ? '买入' : '卖出',
        conditions: order.conditions,
        period: order.start_date + ' 至 ' + order.end_date
      }, null, 2);

      try {
        await navigator.clipboard.writeText(copyText);
        showToast('已复制到剪贴板');
      } catch (err) {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = copyText;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('已复制到剪贴板');
      }
    }

    // 显示提示
    function showToast(message, type = 'success') {
      let toast = document.querySelector('.export-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'export-toast';
        document.body.appendChild(toast);
      }
      toast.classList.remove('toast-success', 'toast-error', 'toast-info');
      toast.classList.add(`toast-${type}`);
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimer) {
        clearTimeout(toastTimer);
      }
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
        toastTimer = null;
      }, 2000);
    }

    function updateConditionsPreview() {
      const previewEl = document.getElementById('conditions-preview');
      if (!previewEl) {
        return;
      }
      const conditions = collectFormConditions();
      if (!conditions.length) {
        previewEl.innerHTML = '条件预览：请先配置触发条件';
        return;
      }
      const logicText = getConditionLogicValue() === 'OR' ? ' 或 ' : ' 且 ';
      const combined = conditions.map((condition) => formatConditionText(condition)).join(logicText);
      previewEl.innerHTML = `<strong>条件预览：</strong>${escapeHtml(combined)}`;
    }

    function initListControls() {
      document.querySelectorAll('.tab-btn[data-status]').forEach((button) => {
        button.addEventListener('click', () => {
          filterOrders(button.dataset.status, button);
        });
      });

      const searchInput = document.getElementById('stock-search');
      if (searchInput) {
        searchInput.addEventListener('input', () => {
          currentSearch = searchInput.value.trim();
          loadOrders();
        });
      }
    }

    function extractImportSource(payload) {
      if (!payload || typeof payload !== 'object') {
        throw new Error('导入内容必须是 JSON 对象');
      }

      const strategy = payload.strategy
        || payload.strategies?.balanced
        || payload.strategies?.aggressive
        || payload.strategies?.conservative
        || payload.report?.strategies?.balanced
        || payload.report?.strategy;

      if (!strategy || typeof strategy !== 'object') {
        throw new Error('未找到可导入的策略建议');
      }

      const action = pickImportAction(strategy);
      const conditions = normalizeImportedConditions(action.trigger_conditions);
      return { action, conditions };
    }

    function importTriggersFromTextarea() {
      const textarea = document.getElementById('import-report-input');
      const raw = textarea.value.trim();
      if (!raw) {
        showToast('请先粘贴 analysis report JSON', 'error');
        return;
      }

      try {
        const payload = JSON.parse(raw);
        const { action, conditions } = extractImportSource(payload);
        const validation = validateEditableConditions(conditions);
        if (!validation.valid) {
          throw new Error(validation.error);
        }

        const form = getCreateForm();
        resetConditions(conditions);
        form.condition_logic.value = action.trigger_logic || 'AND';
        if (action.position_percent !== undefined) {
          form.position_pct.value = action.position_percent;
        }
        if (action.stop_loss !== undefined) {
          form.stop_loss_price.value = action.stop_loss;
        }
        form.order_type.value = inferOrderTypeFromConditions(conditions);
        showToast('已导入触发建议，可继续调整参数', 'success');
      } catch (error) {
        showToast(`导入失败：${error.message}`, 'error');
      }
    }

    function clearImportTextarea() {
      const textarea = document.getElementById('import-report-input');
      if (textarea) {
        textarea.value = '';
      }
    }

    // 加载监控池股票列表
    async function loadMonitorPoolStocks() {
      try {
        const response = await fetch('/api/monitor-pool/stock-list');
        const result = await response.json();
        
        const selector = document.getElementById('stock-selector');
        if (!selector) return;
        
        // 清空选项（保留第一个提示选项）
        selector.innerHTML = '<option value="">从监控池选择...</option>';
        
        // 从已加载的条件单数据中提取监控池股票（临时方案）
        // TODO: 修改 API 返回完整数据
        if (result.success && result.stocks && result.stocks.length > 0) {
          result.stocks.forEach(stock => {
            const option = document.createElement('option');
            option.value = JSON.stringify({
              ts_code: stock.stock_code,
              stock_name: stock.stock_name
            });
            option.textContent = `${stock.stock_name} (${stock.stock_code})`;
            selector.appendChild(option);
          });
        } else {
          const option = document.createElement('option');
          option.value = '';
          option.textContent = '监控池为空，请手动输入';
          option.disabled = true;
          selector.appendChild(option);
        }
      } catch (error) {
        console.error('加载监控池失败:', error);
      }
    }

    // 加载选定股票的报告列表
    async function loadReports(tsCode) {
      const reportSelector = document.getElementById('report-selector');
      const importBtn = document.getElementById('btn-import-report');
      
      if (!tsCode) {
        reportSelector.innerHTML = '<option value="">请先选择股票...</option>';
        importBtn.disabled = true;
        return;
      }
      
      reportSelector.innerHTML = '<option value="">正在加载报告...</option>';
      
      try {
        // 使用新的 /api/report/list 接口
        const response = await fetch(`/api/report/list?stock_code=${tsCode}`);
        const result = await response.json();

        if (result.success && result.reports && result.reports.length > 0) {
          reportSelector.innerHTML = result.reports.map(r =>
            `<option value="${r.report_id}" data-id="${r.report_id}">${r.created_at ? r.created_at.split('T')[0] : ''} - ${r.report_id}</option>`
          ).join('');
          importBtn.disabled = false;
        } else {
          reportSelector.innerHTML = '<option value="">未找到该股票报告</option>';
          importBtn.disabled = true;
        }
      } catch (error) {
        console.error('加载报告失败:', error);
        reportSelector.innerHTML = '<option value="">加载失败</option>';
        importBtn.disabled = true;
      }
    }

    async function importFromSelectedReport() {
      const reportSelector = document.getElementById('report-selector');
      const styleSelector = document.getElementById('style-selector');
      const tsCodeInput = document.getElementById('create-form').ts_code;
      
      const tsCode = tsCodeInput.value;
      const riskType = styleSelector.value;
      const reportFilename = reportSelector.value;
      
      if (!tsCode || !riskType) {
        showToast('缺少股票代码或策略风格', 'error');
        return;
      }
      
      showToast('正在获取策略建议...', 'info');
      
      try {
        const response = await fetch(`/api/analysis/v2/strategy/${tsCode}/${riskType}`);
        const result = await response.json();
        
        if (result.success && result.data) {
          const strategy = result.data;
          const action = pickImportAction(strategy);
          const conditions = normalizeImportedConditions(action.trigger_conditions);
          
          const form = getCreateForm();
          resetConditions(conditions);
          form.condition_logic.value = action.trigger_logic || 'AND';
          if (action.position_percent !== undefined) {
            form.position_pct.value = action.position_percent;
          }
          if (action.stop_loss !== undefined) {
            form.stop_loss_price.value = action.stop_loss;
          }
          form.order_type.value = inferOrderTypeFromConditions(conditions);
          form.action.value = action.action_type || 'buy';
          
          showToast(`已成功导入 ${tsCode} 的${riskType === 'balanced' ? '稳健型' : riskType === 'aggressive' ? '激进型' : '保守型'}策略`, 'success');
        } else {
          showToast('获取策略失败：' + (result.error || '未知错误'), 'error');
        }
      } catch (error) {
        showToast('导入异常：' + error.message, 'error');
      }
    }

    // 股票选择器变更处理
    function onStockSelected() {
      const selector = document.getElementById('stock-selector');
      const nameInput = document.getElementById('stock-name-input');
      const selectedValue = selector.value;
      
      if (selectedValue) {
        try {
          const stock = JSON.parse(selectedValue);
          // 填充股票代码和名称
          const form = getCreateForm();
          form.ts_code.value = stock.ts_code;
          if (nameInput) {
            nameInput.value = stock.stock_name;
          }
          showToast(`已选择 ${stock.stock_name}`, 'success');
          
          // 加载报告
          loadReports(stock.ts_code);
        } catch (error) {
          console.error('解析股票数据失败:', error);
        }
      }
    }

    // 切换手动输入模式
    function toggleStockInput() {
      const selector = document.getElementById('stock-selector');
      const manualInput = document.getElementById('stock-code-manual');
      const toggleBtn = document.getElementById('toggle-stock-btn');
      
      if (manualInput.style.display === 'none') {
        manualInput.style.display = 'block';
        selector.style.display = 'none';
        toggleBtn.textContent = '从监控池选择';
        manualInput.focus();
      } else {
        manualInput.style.display = 'none';
        selector.style.display = 'block';
        toggleBtn.textContent = '手动输入';
        loadMonitorPoolStocks();
      }
    }

    // 初始化
    // 初始化因子面板回调
    if (window.FactorPanel) {
      window.FactorPanel.setChangeCallback((state) => {
        updateConditionsPreview();
      });
    }

    initListControls();
    resetCreateForm();
    updateBatchSummary(0);
    loadOrders();
    handleImportFromQuery();
