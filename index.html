<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A股投资系统</title>
  <link rel="stylesheet" href="./pages/style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Top-Down Selection</span>
        <h1>A股投资系统</h1>
        <p class="subtitle">自上而下，系统化投资</p>
        <div class="hero-actions">
          <button id="load-directions" class="cta-button" type="button">开始选股</button>
        </div>
      </div>

      <div class="hero-side">
        <div class="stat-card">
          <article class="stat-item">
            <div class="stat-label">筛选方式</div>
            <div class="stat-value">4D</div>
            <div class="stat-note">趋势、政策、舆论、商业</div>
          </article>
          <article class="stat-item">
            <div class="stat-label">研究节奏</div>
            <div class="stat-value">5步</div>
            <div class="stat-note">行业优先，再落到个股</div>
          </article>
        </div>

        <article class="method-card">
          <h2>方向筛选框架</h2>
          <p>先发现符合时代主线的大方向，再按四维度打分，保留最有胜率的赛道进入下一步个股分析。</p>
          <div class="method-tags">
            <span class="tag">社会经济趋势</span>
            <span class="tag">政策方向</span>
            <span class="tag">舆论热度</span>
            <span class="tag">商业变现</span>
          </div>
        </article>
      </div>
    </section>

    <section class="panel" id="results-panel">
      <div class="section-head">
        <div>
          <h2>选股结果</h2>
          <p>勾选你要进入下一步分析的行业方向。</p>
        </div>
        <div id="status-text" class="status-text">尚未开始筛选</div>
      </div>

      <div id="result-list" class="result-list">
        <div class="empty-state">点击“开始选股”后加载方向评分结果。</div>
      </div>

      <div class="bottom-bar">
        <div id="selection-note" class="selection-note">已选择 0 个方向</div>
        <div class="bottom-actions">
          <button id="view-report" class="button button-secondary" type="button" disabled>查看选股报告</button>
          <button id="next-step" class="next-button" type="button" disabled>下一步：个股分析</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const loadButton = document.getElementById('load-directions');
    const scrollButton = document.getElementById('scroll-results');
    const resultList = document.getElementById('result-list');
    const nextStepButton = document.getElementById('next-step');
    const statusText = document.getElementById('status-text');
    const selectionNote = document.getElementById('selection-note');
    const storageKey = 'selectedDirections';
    const apiBase = window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin;

    let currentDirections = [];

    async function requestJson(path, options = {}) {
      const response = await fetch(`${apiBase}${path}`, {
        ...options,
        headers: {
          'Accept': 'application/json',
          ...(options.headers || {})
        }
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return response.json();
    }

    function updateSelectionState() {
      const selected = Array.from(document.querySelectorAll('input[name="direction"]:checked')).map((input) => {
        return {
          name: input.value,
          score: Number(input.dataset.score || 0)
        };
      });

      localStorage.setItem(storageKey, JSON.stringify(selected));
      selectionNote.textContent = `已选择 ${selected.length} 个方向`;
      nextStepButton.disabled = selected.length === 0;
    }

    function renderDirections(directions) {
      if (!Array.isArray(directions) || directions.length === 0) {
        resultList.innerHTML = '<div class="empty-state">当前没有可用方向，请稍后重试。</div>';
        updateSelectionState();
        return;
      }

      const saved = new Set(
        JSON.parse(localStorage.getItem(storageKey) || '[]').map((item) => item.name)
      );

      resultList.innerHTML = directions.map((direction) => {
        const checked = saved.has(direction.name) ? 'checked' : '';
        return `
          <article class="direction-card">
            <label class="direction-check" aria-label="选择${direction.name}">
              <input type="checkbox" name="direction" value="${direction.name}" data-score="${direction.score}" ${checked}>
            </label>
            <div class="direction-main">
              <div class="direction-top">
                <h3 class="direction-name">${direction.name}</h3>
              </div>
              <p class="direction-reason">${direction.reason || ''}</p>
            </div>
            <div class="score-badge">
              <div class="score-label">评分</div>
              <div class="score-value">${direction.score}</div>
            </div>
          </article>
        `;
      }).join('');

      document.querySelectorAll('input[name="direction"]').forEach((input) => {
        input.addEventListener('change', updateSelectionState);
      });

      updateSelectionState();
    }

    async function loadDirections() {
      loadButton.disabled = true;
      statusText.textContent = '筛选中...';

      try {
        const payload = await requestJson('/api/select');
        currentDirections = payload.directions || [];
        renderDirections(currentDirections);
        statusText.textContent = `已返回 ${currentDirections.length} 个候选方向`;
        if (scrollButton) {
          scrollButton.classList.remove('hidden');
        }
      } catch (error) {
        resultList.innerHTML = `<div class="empty-state">加载失败：${error.message}</div>`;
        statusText.textContent = '接口请求失败';
      } finally {
        loadButton.disabled = false;
      }
    }

    loadButton.addEventListener('click', loadDirections);

    nextStepButton.addEventListener('click', () => {
      if (nextStepButton.disabled) {
        return;
      }
      window.location.href = './analysis.html';
    });

    // 查看选股报告
    const viewReportBtn = document.getElementById('view-report');
    viewReportBtn.addEventListener('click', async () => {
      if (viewReportBtn.disabled) return;
      viewReportBtn.disabled = true;
      viewReportBtn.textContent = '生成中...';
      
      try {
        const data = await requestJson('/api/select/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        if (data.report_path) {
          window.open(data.report_path, '_blank');
        } else {
          alert('选股报告功能开发中');
        }
      } catch (e) {
        alert('选股报告功能开发中');
      } finally {
        viewReportBtn.disabled = currentDirections.length === 0;
        viewReportBtn.textContent = '查看选股报告';
      }
    });

    // 选股完成后启用报告按钮
    const originalRender = renderDirections;
    renderDirections = function(dirs) {
      originalRender(dirs);
      viewReportBtn.disabled = dirs.length === 0;
    };

    updateSelectionState();
  </script>
</body>
</html>
