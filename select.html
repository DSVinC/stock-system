<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A 股投资系统 | 行业选股</title>
  <link rel="stylesheet" href="./pages/style.css">
  <style>
    .top-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .top-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    .top-nav a.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }
    .page-header {
      margin-bottom: 1.5rem;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .page-header p {
      color: var(--text-soft);
      font-size: 0.875rem;
    }
    .methodology-card {
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.08), rgba(56, 189, 248, 0.02));
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .methodology-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .methodology-dimensions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.8125rem;
      color: var(--text-soft);
    }
    .dimension-tag {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.1);
      color: var(--accent);
      font-weight: 500;
    }
    .directions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .action-bar {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 3rem 0;
    }
    .start-btn {
      padding: 1rem 3rem;
      background: linear-gradient(135deg, var(--accent), rgba(56, 189, 248, 0.8));
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(56, 189, 248, 0.4);
    }
    .start-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .confirm-btn {
      padding: 1rem 3rem;
      background: linear-gradient(135deg, var(--good), rgba(34, 197, 94, 0.8));
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.125rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
    }
    .confirm-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(34, 197, 94, 0.4);
    }
    .confirm-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .selection-hint {
      text-align: center;
      color: var(--text-soft);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .direction-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 1.25rem;
      transition: all 0.2s ease;
      cursor: pointer;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .direction-card:hover {
      border-color: rgba(56, 189, 248, 0.5);
    }
    .direction-card.selected {
      border-color: var(--good);
      background: rgba(34, 197, 94, 0.08);
    }
    .direction-card.expanded {
      border-color: rgba(56, 189, 248, 0.5);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .card-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .checkbox-custom {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .checkbox-custom.checked {
      background: var(--good);
      border-color: var(--good);
    }
    .checkbox-custom.checked::after {
      content: '✓';
      color: white;
      font-size: 14px;
      font-weight: 700;
    }
    .direction-name {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .score-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 700;
      background: rgba(34, 197, 94, 0.15);
      color: var(--good);
    }
    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .direction-card.expanded .card-details {
      max-height: 500px;
      margin-top: 1rem;
    }
    .dimensions-bar {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      margin: 1rem 0;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
    }
    .dimension-item {
      flex: 1;
      text-align: center;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      min-width: 0;
    }
    .dimension-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }
    .dimension-label {
      font-size: 0.625rem;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .metrics-list {
      margin-top: 1rem;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 12px;
    }
    .metric-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8125rem;
      padding: 0.25rem 0;
      color: var(--text-soft);
      gap: 1rem;
      line-height: 1.4;
    }
    .metric-row strong {
      color: var(--text);
      white-space: nowrap;
    }
    .metric-row .positive { color: var(--good); }
    .metric-row .negative { color: var(--bad); }
    .picks-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .picks-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-faint);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .picks-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .pick-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: 0.625rem 0.875rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .pick-item:hover {
      background: rgba(56, 189, 248, 0.1);
    }
    .pick-left {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      min-width: 0;
    }
    .pick-name {
      font-weight: 600;
      color: var(--text);
      font-size: 0.875rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pick-code {
      font-size: 0.75rem;
      color: var(--info);
    }
    .pick-metrics {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-soft);
      white-space: nowrap;
    }
    .pick-metrics .mv {
      color: var(--text);
      font-weight: 600;
    }
    .reason-box {
      margin-top: 1rem;
      padding: 0.875rem;
      background: rgba(56, 189, 248, 0.08);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      font-size: 0.8125rem;
      color: var(--text-soft);
      line-height: 1.6;
    }
    .loading-state, .error-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-soft);
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-state {
      color: var(--bad);
    }
    .refresh-btn {
      margin-top: 1rem;
      padding: 0.625rem 1.5rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .refresh-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .generated-info {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-faint);
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="top-nav">
    <a href="./index.html">首页</a>
    <a href="./select.html" class="active">行业选股</a>
    <a href="./analysis.html">个股分析</a>
    <a href="./monitor-pool.html">监控池</a>
    <a href="./portfolio.html">账户管理</a>
    <a href="./conditional-order.html">条件单</a>
    <a href="./backtest.html">回测系统</a>
  </nav>

  <main class="container">
    <!-- 页面标题 -->
    <div class="page-header">
      <h1>🎯 行业选股推荐</h1>
      <p>基于四维度评估模型，筛选当前市场最具投资价值的行业方向</p>
    </div>

    <!-- 方法论说明 -->
    <div class="methodology-card">
      <div class="methodology-title">
        <span>📊</span>
        筛选方法论
      </div>
      <div class="methodology-dimensions">
        <span class="dimension-tag">社会经济趋势</span>
        <span class="dimension-tag">政策方向</span>
        <span class="dimension-tag">舆论热度</span>
        <span class="dimension-tag">商业变现</span>
      </div>
    </div>

    <!-- 开始选股按钮 -->
    <div class="action-bar" id="actionBar">
      <button class="start-btn" onclick="startSelection()">
        🚀 开始选股
      </button>
    </div>

    <!-- 选择提示和确定按钮 -->
    <div style="display: none;" id="selectionControls">
      <div class="selection-hint">
        💡 点击卡片左侧复选框选择方向（可多选），点击卡片右侧展开详情
      </div>
      <div class="action-bar">
        <button class="confirm-btn" id="confirmBtn" onclick="confirmSelection()" disabled>
          ✅ 确定所选方向 (<span id="selectedCount">0</span>)
        </button>
      </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading-state" id="loadingState" style="display: none;">
      <div class="loading-spinner"></div>
      <p>正在分析市场数据，筛选优质行业方向...</p>
    </div>

    <!-- 错误状态 -->
    <div class="error-state" id="errorState" style="display: none;">
      <p>⚠️ 数据加载失败</p>
      <p id="errorMessage" style="margin-top: 0.5rem; font-size: 0.875rem;"></p>
      <button class="refresh-btn" onclick="startSelection()">重新选股</button>
    </div>

    <!-- 行业方向列表 -->
    <div class="directions-grid" id="directionsGrid" style="display: none;"></div>

    <!-- 生成信息 -->
    <div class="generated-info" id="generatedInfo" style="display: none;"></div>
  </main>

  <script>
    // 选中的方向
    let selectedDirections = new Set();

    // 开始选股
    function startSelection() {
      loadSelectionData();
    }

    // 切换选择状态
    function toggleSelection(tsCode, name) {
      if (selectedDirections.has(tsCode)) {
        selectedDirections.delete(tsCode);
      } else {
        selectedDirections.add(tsCode);
      }
      updateSelectedCount();
      
      // 更新卡片样式
      const card = document.querySelector(`[data-ts-code="${tsCode}"]`);
      if (card) {
        card.classList.toggle('selected', selectedDirections.has(tsCode));
      }
      
      // 同步更新复选框状态
      const checkbox = card?.querySelector('input[type="checkbox"]');
      if (checkbox) {
        checkbox.checked = selectedDirections.has(tsCode);
      }
    }

    // 切换展开状态
    function toggleExpand(card) {
      card.classList.toggle('expanded');
    }

    // 更新选中计数
    function updateSelectedCount() {
      document.getElementById('selectedCount').textContent = selectedDirections.size;
      document.getElementById('confirmBtn').disabled = selectedDirections.size === 0;
    }

    // 确认选择
    function confirmSelection() {
      if (selectedDirections.size === 0) return;
      
      // 将选中的方向信息存储到 localStorage（与 analysis.html 统一）
      const selectedData = Array.from(selectedDirections).map(code => {
        return window.directionData.find(d => d.ts_code === code);
      });
      localStorage.setItem('selectedDirections', JSON.stringify(selectedData));
      
      // 跳转到选股分析页面 - 传递行业名称（与 analysis.html 统一）
      const names = Array.from(selectedDirections).map(code => {
        const d = window.directionData.find(x => x.ts_code === code);
        return d ? d.name : code;
      });
      const params = names.map(n => `direction=${encodeURIComponent(n)}`).join('&');
      window.location.href = `./analysis.html?${params}`;
    }

    // 加载行业选股数据
    async function loadSelectionData() {
      const actionBar = document.getElementById('actionBar');
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const directionsGrid = document.getElementById('directionsGrid');
      const generatedInfo = document.getElementById('generatedInfo');
      const errorMessage = document.getElementById('errorMessage');

      actionBar.style.display = 'none';
      loadingState.style.display = 'block';
      errorState.style.display = 'none';
      directionsGrid.style.display = 'none';
      generatedInfo.style.display = 'none';

      try {
        const response = await fetch('/api/select');
        
        if (!response.ok) {
          throw new Error(`API 响应失败：${response.status}`);
        }

        const data = await response.json();

        if (!data.success && data.directions && data.directions.length === 0) {
          throw new Error(data.message || '暂无行业推荐数据');
        }

        // 渲染行业方向
        renderDirections(data.directions || data);
        
        // 显示生成信息
        const generatedAt = new Date(data.generatedAt);
        generatedInfo.innerHTML = `
          报告生成时间：${generatedAt.toLocaleString('zh-CN', { hour12: false })} 
          ${data.tradeDate ? `| 交易日：${data.tradeDate}` : ''}
          ${data.risks ? `<br><span style="color: var(--bad)">⚠️ 风险提示：${data.risks[0]}</span>` : ''}
        `;
        generatedInfo.style.display = 'block';

      } catch (error) {
        console.error('加载失败:', error);
        loadingState.style.display = 'none';
        errorState.style.display = 'block';
        errorMessage.textContent = error.message;
      }
    }

    // 渲染行业方向卡片
    function renderDirections(directions) {
      const grid = document.getElementById('directionsGrid');
      const selectionControls = document.getElementById('selectionControls');
      grid.innerHTML = '';

      // 保存数据供 confirmSelection 使用
      window.directionData = directions;

      directions.forEach((direction, index) => {
        const card = document.createElement('div');
        card.className = 'direction-card';
        card.setAttribute('data-ts-code', direction.ts_code);
        
        const isTop3 = index < 3;
        const scoreColor = direction.score >= 80 ? 'var(--good)' : direction.score >= 60 ? 'var(--accent)' : 'var(--warning)';
        
        card.innerHTML = `
          <div class="card-header" onclick="event.stopPropagation()">
            <div class="card-left" onclick="toggleSelection('${direction.ts_code}', '${direction.name.replace(/'/g, "\\'")}')">
              <div class="checkbox-custom" id="checkbox-${direction.ts_code}"></div>
              <div class="direction-name">${isTop3 ? '🏆 ' : ''}${direction.name}</div>
            </div>
            <div class="score-badge" style="background: ${scoreColor}22; color: ${scoreColor}" onclick="toggleExpand(this.closest('.direction-card'))">
              ${direction.score}
              <span style="margin-left: 4px; opacity: 0.6;">▼</span>
            </div>
          </div>

          <div class="card-details">
            <div class="dimensions-bar">
              <div class="dimension-item">
                <div class="dimension-value">${direction.dimensions.social}</div>
                <div class="dimension-label">社会</div>
              </div>
              <div class="dimension-item">
                <div class="dimension-value">${direction.dimensions.policy}</div>
                <div class="dimension-label">政策</div>
              </div>
              <div class="dimension-item">
                <div class="dimension-value">${direction.dimensions.public}</div>
                <div class="dimension-label">舆论</div>
              </div>
              <div class="dimension-item">
                <div class="dimension-value">${direction.dimensions.business}</div>
                <div class="dimension-label">商业</div>
              </div>
            </div>

            <div class="metrics-list">
              <div class="metric-row">
                <span>板块资金</span>
                <span class="${direction.metrics.netAmount >= 0 ? 'positive' : 'negative'}">
                  ${direction.metrics.netAmount >= 0 ? '+' : ''}${direction.metrics.netAmount.toFixed(2)} 亿元
                </span>
              </div>
              <div class="metric-row">
                <span>热度排名</span>
                <span>${direction.metrics.hotRank ? `第 ${direction.metrics.hotRank} 名` : '暂无'}</span>
              </div>
              <div class="metric-row">
                <span>板块成分</span>
                <strong>${direction.metrics.companyCount} 家</strong>
              </div>
              <div class="metric-row">
                <span>近一年 IPO</span>
                <strong>${direction.metrics.ipoMatches} 家</strong>
              </div>
            </div>

            <div class="reason-box">
              ${direction.reason}
            </div>
          </div>
        `;

        // 点击卡片背景展开/折叠
        card.addEventListener('click', (e) => {
          if (!e.target.closest('.checkbox-custom') && !e.target.closest('.card-left')) {
            toggleExpand(card);
          }
        });

        grid.appendChild(card);
      });

      grid.style.display = 'grid';
      document.getElementById('loadingState').style.display = 'none';
      selectionControls.style.display = 'block';
    }

    // 页面加载时不自动获取数据，等待用户点击按钮
  </script>
</body>
</html>
