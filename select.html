<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A 股投资系统 | 行业选股</title>
  <link rel="stylesheet" href="./pages/style.css">
  <style>
    .top-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .top-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    .top-nav a.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }
    .page-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .hero {
      margin-bottom: 1.5rem;
    }
    .hero .eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .hero h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .hero > p {
      color: var(--text-soft);
      font-size: 0.875rem;
    }
    .control-bar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 20px;
    }
    .refresh-btn, .config-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .refresh-btn {
      background: var(--accent);
      color: white;
    }
    .refresh-btn:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }
    .config-btn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .config-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .panel-inner {
      max-width: 100%;
    }
    .section-header {
      margin-bottom: 1.5rem;
    }
    .section-header h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .section-subtitle {
      color: var(--text-soft);
      font-size: 0.875rem;
    }
    .section-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .industries-grid, .stocks-grid {
      display: grid;
      gap: 1rem;
    }
    .industries-grid {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }
    .stocks-grid {
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .industry-card, .stock-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 1rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .industry-card:hover, .stock-card:hover {
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
      transform: translateY(-2px);
    }
    .industry-rank, .stock-rank {
      font-size: 1.5rem;
      font-weight: 700;
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }
    .industry-info, .stock-info {
      flex: 1;
      min-width: 0;
    }
    .industry-name, .stock-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .stock-code {
      font-size: 0.75rem;
      color: var(--info);
      font-family: monospace;
    }
    .industry-score, .stock-score {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }
    .stock-decision {
      font-size: 0.875rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .stock-decision.buy {
      background: rgba(74, 222, 128, 0.15);
      color: var(--good);
      border: 1px solid rgba(74, 222, 128, 0.3);
    }
    .stock-decision.watch {
      background: rgba(251, 191, 36, 0.15);
      color: var(--warn);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .stock-decision.avoid {
      background: rgba(251, 113, 133, 0.15);
      color: var(--bad);
      border: 1px solid rgba(251, 113, 133, 0.3);
    }
    .industry-dimensions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }
    .dimension {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
    }
    .dimension-label {
      color: var(--text-faint);
    }
    .dimension-value {
      color: var(--text);
      font-weight: 600;
    }
    .loading-state, .error-state, .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-soft);
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-state {
      color: var(--bad);
    }
    .empty-state {
      color: var(--text-soft);
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
    .empty-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .empty-copy {
      font-size: 0.875rem;
      color: var(--text-soft);
      max-width: 400px;
      margin: 0 auto;
    }
    .generated-info {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-faint);
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* 配置面板样式 */
    .config-panel {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .config-panel.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .config-modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1.5rem;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .config-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .config-header h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
    }
    .config-close {
      background: none;
      border: none;
      color: var(--text-soft);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .config-close:hover {
      color: var(--text);
    }
    .config-group {
      margin-bottom: 1.25rem;
    }
    .config-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .config-hint {
      font-size: 0.75rem;
      color: var(--text-faint);
      margin-left: 0.5rem;
    }
    .config-input, .config-select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    .config-input:focus, .config-select:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
    }
    .config-select {
      cursor: pointer;
    }
    .config-select option {
      background: #1a1a2e;
      color: var(--text);
    }
    .config-actions {
      display: flex;
      gap: 12px;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .config-actions button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .config-cancel {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-soft);
    }
    .config-cancel:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }
    .config-apply {
      background: var(--accent);
      color: white;
    }
    .config-apply:hover {
      background: var(--accent-strong);
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .control-bar {
        flex-direction: column;
      }
      .refresh-btn, .config-btn {
        width: 100%;
        justify-content: center;
      }
      .industries-grid, .stocks-grid {
        grid-template-columns: 1fr;
      }
      .industry-card, .stock-card {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }
      .industry-rank, .stock-rank {
        width: 100%;
        margin-bottom: 0.5rem;
      }
      .industry-dimensions {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .page-shell {
        padding: 10px;
      }
      .panel {
        padding: 1rem;
      }
      .section-card {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <nav class="top-nav">
      <a href="./select.html" class="active">选股分析</a>
      <a href="./analysis.html">个股分析</a>
      <a href="./monitor-pool.html">监控池</a>
      <a href="./conditional-order.html">条件单</a>
      <a href="./backtest.html">回测系统</a>
      <a href="./portfolio.html">账户管理</a>
    </nav>

    <section class="hero">
      <p class="eyebrow">Industry Selection</p>
      <h1>行业选股</h1>
      <p>基于四维度评估模型，筛选当前市场最具投资价值的行业方向</p>
    </section>

    <!-- 控制栏 -->
    <div class="control-bar">
      <button class="refresh-btn" onclick="refreshSelection()">
        🔄 刷新选股结果
      </button>
      <button class="config-btn" onclick="showConfigPanel()">
        ⚙️ 参数配置
      </button>
    </div>

    <section class="panel">
      <div class="panel-inner">
        <!-- Top3 行业展示区域 -->
        <div class="section-header">
          <h2>🏆 Top3 行业推荐</h2>
          <div class="section-subtitle">基于四维度综合评分系统自动筛选</div>
        </div>

        <div class="section-card" id="top3Section" style="display: none;">
          <div class="industries-grid" id="top3Grid"></div>
        </div>

        <!-- Top10 股票池展示区域 -->
        <div class="section-header">
          <h2>📈 Top10 核心股票池</h2>
          <div class="section-subtitle">基于综合评分模型筛选出的优质个股</div>
        </div>

        <div class="section-card" id="top10Section" style="display: none;">
          <div class="stocks-grid" id="top10Grid"></div>
        </div>

        <!-- 加载状态 -->
        <div class="loading-state" id="loadingState">
          <div class="loading-spinner"></div>
          <p>正在加载选股数据...</p>
        </div>

        <!-- 错误状态 -->
        <div class="error-state" id="errorState" style="display: none;">
          <p>⚠️ 数据加载失败</p>
          <p id="errorMessage" style="margin-top: 0.5rem; font-size: 0.875rem;"></p>
          <button class="refresh-btn" onclick="refreshSelection()">重试</button>
        </div>

        <!-- 空状态 -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-icon">📭</div>
          <h3 class="empty-title">暂无选股数据</h3>
          <p class="empty-copy">当前没有可用的选股数据。可能是数据源暂未更新，请稍后重试。</p>
          <button class="refresh-btn" onclick="refreshSelection()" style="margin-top: 1rem;">刷新数据</button>
        </div>

        <!-- 生成信息 -->
        <div class="generated-info" id="generatedInfo" style="display: none;"></div>
      </div>
    </section>

    <!-- 参数配置面板 -->
    <div class="config-panel" id="configPanel">
      <div class="config-modal">
        <div class="config-header">
          <h3>⚙️ 选股参数配置</h3>
          <button class="config-close" onclick="hideConfigPanel()">&times;</button>
        </div>
        <div class="config-group">
          <label class="config-label">
            股票数量
            <span class="config-hint">1-20只</span>
          </label>
          <input type="number" class="config-input" id="configLimit" min="1" max="20" value="10">
        </div>
        <div class="config-group">
          <label class="config-label">
            最低评分
            <span class="config-hint">过滤低评分股票</span>
          </label>
          <input type="number" class="config-input" id="configMinScore" min="0" max="100" value="0" step="5">
        </div>
        <div class="config-group">
          <label class="config-label">
            决策过滤
            <span class="config-hint">按投资建议筛选</span>
          </label>
          <select class="config-select" id="configDecision">
            <option value="">全部</option>
            <option value="buy">买入</option>
            <option value="watch">观察</option>
            <option value="avoid">回避</option>
          </select>
        </div>
        <div class="config-actions">
          <button class="config-cancel" onclick="hideConfigPanel()">取消</button>
          <button class="config-apply" onclick="applyConfig()">应用并刷新</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // 全局数据
    let top3Industries = [];
    let top10Stocks = [];

    // 配置参数（持久化到 localStorage）
    const DEFAULT_CONFIG = {
      limit: 10,
      minScore: 0,
      decision: ''
    };

    function getConfig() {
      try {
        const saved = localStorage.getItem('stockSelectConfig');
        return saved ? { ...DEFAULT_CONFIG, ...JSON.parse(saved) } : { ...DEFAULT_CONFIG };
      } catch {
        return { ...DEFAULT_CONFIG };
      }
    }

    function saveConfig(config) {
      try {
        localStorage.setItem('stockSelectConfig', JSON.stringify(config));
      } catch (e) {
        console.warn('保存配置失败:', e);
      }
    }

    // 初始化页面
    async function initPage() {
      // 恢复配置
      const config = getConfig();
      document.getElementById('configLimit').value = config.limit;
      document.getElementById('configMinScore').value = config.minScore;
      document.getElementById('configDecision').value = config.decision;

      loadSelectionData();
    }

    // 刷新选股结果
    async function refreshSelection() {
      const btn = document.querySelector('.refresh-btn');
      btn.disabled = true;
      btn.innerHTML = '⏳ 加载中...';

      try {
        await loadSelectionData();
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔄 刷新选股结果';
      }
    }

    // 显示配置面板
    function showConfigPanel() {
      document.getElementById('configPanel').classList.add('active');
    }

    // 隐藏配置面板
    function hideConfigPanel() {
      document.getElementById('configPanel').classList.remove('active');
    }

    // 应用配置并刷新
    function applyConfig() {
      const config = {
        limit: parseInt(document.getElementById('configLimit').value) || 10,
        minScore: parseFloat(document.getElementById('configMinScore').value) || 0,
        decision: document.getElementById('configDecision').value || ''
      };

      saveConfig(config);
      hideConfigPanel();
      refreshSelection();
    }

    // 加载选股数据
    async function loadSelectionData() {
      const loadingState = document.getElementById('loadingState');
      const errorState = document.getElementById('errorState');
      const emptyState = document.getElementById('emptyState');
      const top3Section = document.getElementById('top3Section');
      const top10Section = document.getElementById('top10Section');
      const generatedInfo = document.getElementById('generatedInfo');
      const errorMessage = document.getElementById('errorMessage');

      loadingState.style.display = 'block';
      errorState.style.display = 'none';
      emptyState.style.display = 'none';
      top3Section.style.display = 'none';
      top10Section.style.display = 'none';
      generatedInfo.style.display = 'none';

      const config = getConfig();
      const stockParams = new URLSearchParams();
      stockParams.set('limit', config.limit);
      if (config.minScore > 0) stockParams.set('minScore', config.minScore);
      if (config.decision) stockParams.set('decision', config.decision);

      try {
        // 并行加载 Top3 行业和 Top N 股票
        const [industriesRes, stocksRes] = await Promise.all([
          fetch('/api/industry/score/top3'),
          fetch(`/api/stock/top?${stockParams.toString()}`)
        ]);

        if (!industriesRes.ok || !stocksRes.ok) {
          throw new Error(`API 响应失败：${industriesRes.status} / ${stocksRes.status}`);
        }

        const industriesData = await industriesRes.json();
        const stocksData = await stocksRes.json();

        top3Industries = industriesData.top3 || [];
        top10Stocks = stocksData.top10 || [];

        // 检查空数据
        if (top3Industries.length === 0 && top10Stocks.length === 0) {
          throw new Error('暂无选股数据');
        }

        // 渲染结果
        renderTop3Industries();
        renderTop10Stocks();

        // 显示生成信息
        const now = new Date();
        generatedInfo.innerHTML = `
          数据更新时间：${now.toLocaleString('zh-CN', { hour12: false })}
          ${stocksData.tradeDate ? `| 交易日：${stocksData.tradeDate}` : ''}
          | 筛选条件：${config.limit}只${config.minScore > 0 ? `, 评分≥${config.minScore}` : ''}${config.decision ? `, ${getDecisionText(config.decision)}` : ''}
        `;
        generatedInfo.style.display = 'block';

      } catch (error) {
        console.error('加载失败:', error);
        loadingState.style.display = 'none';

        if (error.message && error.message.includes('暂无选股数据')) {
          emptyState.style.display = 'block';
          errorState.style.display = 'none';
        } else {
          errorState.style.display = 'block';
          emptyState.style.display = 'none';
          errorMessage.textContent = error.message;
        }

        top3Section.style.display = 'none';
        top10Section.style.display = 'none';
        generatedInfo.style.display = 'none';
      }
    }

    // 渲染 Top3 行业
    function renderTop3Industries() {
      const grid = document.getElementById('top3Grid');
      const section = document.getElementById('top3Section');
      grid.innerHTML = '';

      if (top3Industries.length === 0) {
        section.style.display = 'none';
        return;
      }

      top3Industries.forEach((industry, index) => {
        const card = document.createElement('div');
        card.className = 'industry-card';
        
        const rankEmoji = ['🥇', '🥈', '🥉'][index] || `${index + 1}.`;
        const scoreColor = getScoreColor(industry.finalScore);
        
        card.innerHTML = `
          <div class="industry-rank">${rankEmoji}</div>
          <div class="industry-info">
            <div class="industry-name">${industry.name}</div>
            <div class="industry-score">${industry.finalScore.toFixed(1)} 分</div>
          </div>
          <div class="industry-dimensions">
            <div class="dimension">
              <span class="dimension-label">政策</span>
              <span class="dimension-value">${industry.policyScore.toFixed(1)}</span>
            </div>
            <div class="dimension">
              <span class="dimension-label">商业</span>
              <span class="dimension-value">${industry.commercialScore.toFixed(1)}</span>
            </div>
            <div class="dimension">
              <span class="dimension-label">舆论</span>
              <span class="dimension-value">${industry.publicScore.toFixed(1)}</span>
            </div>
            <div class="dimension">
              <span class="dimension-label">资本</span>
              <span class="dimension-value">${industry.capitalScore.toFixed(1)}</span>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      section.style.display = 'block';
      document.getElementById('loadingState').style.display = 'none';
    }

    // 渲染 Top10 股票
    function renderTop10Stocks() {
      const grid = document.getElementById('top10Grid');
      const section = document.getElementById('top10Section');
      grid.innerHTML = '';

      if (top10Stocks.length === 0) {
        section.style.display = 'none';
        return;
      }

      top10Stocks.forEach((stock, index) => {
        const card = document.createElement('div');
        card.className = 'stock-card';

        // 动态生成 rank emoji，支持任意数量
        let rankEmoji;
        if (index < 3) {
          rankEmoji = ['🥇', '🥈', '🥉'][index];
        } else {
          rankEmoji = `${index + 1}.`;
        }

        card.innerHTML = `
          <div class="stock-rank">${rankEmoji}</div>
          <div class="stock-info">
            <div class="stock-name">${stock.name}</div>
            <div class="stock-code">${stock.code}</div>
          </div>
          <div class="stock-score">${stock.finalScore.toFixed(1)} 分</div>
          <div class="stock-decision ${stock.decision}">${getDecisionText(stock.decision)}</div>
        `;

        grid.appendChild(card);
      });

      section.style.display = 'block';
      document.getElementById('loadingState').style.display = 'none';
    }

    // 获取分数颜色
    function getScoreColor(score) {
      if (score >= 80) return 'var(--good)';
      if (score >= 60) return 'var(--warn)';
      return 'var(--bad)';
    }

    // 获取决策颜色
    function getDecisionColor(decision) {
      switch (decision) {
        case 'buy': return 'var(--good)';
        case 'watch': return 'var(--warn)';
        case 'avoid': return 'var(--bad)';
        default: return 'var(--text-soft)';
      }
    }

    // 获取决策文本
    function getDecisionText(decision) {
      switch (decision) {
        case 'buy': return '买入';
        case 'watch': return '观察';
        case 'avoid': return '回避';
        default: return '待定';
      }
    }

    // 页面加载时自动初始化
    window.addEventListener('DOMContentLoaded', initPage);

    // 点击配置面板背景关闭
    document.getElementById('configPanel').addEventListener('click', function(e) {
      if (e.target === this) {
        hideConfigPanel();
      }
    });

    // ESC 键关闭配置面板
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        hideConfigPanel();
      }
    });
  </script>
</body>
</html>
