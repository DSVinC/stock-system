<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模拟账户 - 股票投资系统</title>
  <link rel="stylesheet" href="./pages/style.css">
  <style>
    /* 页面特定样式 */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .top-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    .top-nav a.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stat-item {
      padding: 20px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      text-align: center;
    }

    .stat-label {
      color: var(--text-faint);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-value {
      margin-top: 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .stat-value.positive { color: var(--bad); }
    .stat-value.negative { color: var(--good); }

    .summary-card {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(37, 99, 235, 0.1));
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .account-card {
      padding: 18px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .account-card:hover {
      border-color: rgba(56, 189, 248, 0.3);
    }

    .account-card.selected {
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.08);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 90%;
      max-width: 500px;
      padding: 28px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--bg-accent);
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-soft);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .form-field {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 500;
    }

    .form-input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(154, 178, 214, 0.18);
      background: rgba(4, 8, 17, 0.46);
      color: var(--text);
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .form-actions .button {
      flex: 1;
    }

    @media (max-width: 860px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 640px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 空状态样式 */
    .empty-state-guide {
      padding: 60px 40px;
      text-align: center;
    }
    .empty-state-guide .icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.8;
    }
    .empty-state-guide .title {
      font-size: 18px;
      color: var(--text-soft);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .empty-state-guide .desc {
      color: var(--text-faint);
      margin-bottom: 24px;
      line-height: 1.6;
      font-size: 14px;
    }
    .empty-state-guide .btn {
      padding: 12px 28px;
      font-size: 15px;
    }

    /* 空数据占位样式 */
    .stat-placeholder {
      color: var(--text-faint);
      font-size: 16px;
      font-style: italic;
    }

    .stat-hint {
      font-size: 13px;
      color: var(--text-faint);
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <a href="./index.html">首页</a>
      <a href="./select.html">选股分析</a>
      <a href="./analysis.html">个股分析</a>
      <a href="./monitor-pool.html">监控池</a>
      <a href="./portfolio.html" class="active">账户管理</a>
      <a href="./conditional-order.html">条件单</a>
      <a href="./backtest.html">回测系统</a>
    </nav>

    <!-- 页面标题 -->
    <section class="hero">
      <p class="eyebrow">Portfolio</p>
      <h1>模拟账户管理</h1>
      <p class="subtitle">管理您的模拟交易账户，追踪投资表现</p>
    </section>
    
    <!-- 账户总览 -->
    <section class="panel summary-card">
      <div class="panel-inner">
        <h2 class="section-title">账户总览</h2>
        <div class="stats-grid" id="stats-grid">
          <div class="stat-item">
            <div class="stat-label">初始资金</div>
            <div class="stat-value" id="initial-cash"><span class="stat-hint">请选择账户</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">当前现金</div>
            <div class="stat-value" id="current-cash"><span class="stat-hint">请选择账户</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">持仓市值</div>
            <div class="stat-value" id="position-value"><span class="stat-hint">请选择账户</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">总资产</div>
            <div class="stat-value" id="total-value"><span class="stat-hint">请选择账户</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">累计收益</div>
            <div class="stat-value" id="total-return"><span class="stat-hint">请选择账户</span></div>
          </div>
          <div class="stat-item">
            <div class="stat-label">收益率</div>
            <div class="stat-value" id="return-rate"><span class="stat-hint">请选择账户</span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 账户列表 -->
    <section class="panel">
      <div class="panel-inner">
        <div class="status-row">
          <h2 class="section-title">账户列表</h2>
          <button class="button" onclick="showCreateModal()">+ 创建账户</button>
        </div>
        <div id="account-list">
          <div class="empty-state-guide">
            <div class="icon">🎯</div>
            <div class="title">开始您的模拟投资之旅</div>
            <div class="desc">创建第一个模拟账户，体验真实的股票交易模拟，<br>追踪投资表现，提升投资技能</div>
            <button class="button" onclick="showCreateModal()">创建第一个账户</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <!-- 创建账户弹窗 -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">创建模拟账户</h3>
        <button class="modal-close" onclick="closeCreateModal()">×</button>
      </div>
      <form onsubmit="createAccount(event)">
        <div class="form-field">
          <label class="form-label">账户名称</label>
          <input type="text" name="account_name" class="form-input" placeholder="例如：主账户、测试账户" required>
        </div>
        <div class="form-field">
          <label class="form-label">初始资金（元）</label>
          <input type="number" name="initial_cash" class="form-input" placeholder="1000000" min="10000" max="10000000" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">创建</button>
          <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentAccountId = null;

    // 重置账户总览显示为空状态提示
    function resetSummaryDisplay() {
      const fields = ['initial-cash', 'current-cash', 'position-value', 'total-value', 'total-return', 'return-rate'];
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.innerHTML = '<span class="stat-hint">请选择账户</span>';
          el.className = 'stat-value';
        }
      });
    }

    async function api(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      return response.json();
    }
    
    async function loadAccounts() {
      const result = await api('/api/portfolio/account');
      const listEl = document.getElementById('account-list');

      if (!result.success || result.data.length === 0) {
        // 显示优化的空状态，带快捷创建入口
        listEl.innerHTML = `
          <div class="empty-state-guide">
            <div class="icon">🎯</div>
            <div class="title">开始您的模拟投资之旅</div>
            <div class="desc">创建第一个模拟账户，体验真实的股票交易模拟，<br>追踪投资表现，提升投资技能</div>
            <button class="btn btn-primary" onclick="showCreateModal()">创建第一个账户</button>
          </div>
        `;
        // 重置账户总览显示
        resetSummaryDisplay();
        return;
      }
      
      listEl.innerHTML = result.data.map(acc => `
        <div class="account-card ${acc.id === currentAccountId ? 'selected' : ''}" onclick="selectAccount(${acc.id})">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <h3 style="margin:0;color:var(--text);">${acc.account_name}</h3>
              <p style="margin:4px 0 0;color:var(--text-soft);font-size:14px;">初始资金: ¥${acc.initial_cash.toLocaleString()}</p>
            </div>
            <div style="text-align:right;">
              <div style="font-size:20px;font-weight:bold;color:${acc.return_rate >= 0 ? 'var(--bad)' : 'var(--good)'};">
                ${acc.return_rate >= 0 ? '+' : ''}${(acc.return_rate * 100).toFixed(2)}%
              </div>
              <p style="margin:4px 0 0;color:var(--text-soft);font-size:14px;">¥${acc.total_return.toLocaleString()}</p>
            </div>
          </div>
        </div>
      `).join('');
      
      // 如果有当前选中的账户，加载详情
      if (currentAccountId) {
        loadAccountSummary(currentAccountId);
      } else if (result.data.length > 0) {
        selectAccount(result.data[0].id);
      }
    }
    
    async function selectAccount(id) {
      currentAccountId = id;
      localStorage.setItem('current_account_id', id);
      loadAccounts();
      loadAccountSummary(id);
    }
    
    async function loadAccountSummary(id) {
      const result = await api(`/api/portfolio/account/${id}/summary`);
      if (!result.success) return;
      
      const { account, positions } = result.data;
      const positionValue = positions.reduce((sum, p) => sum + (p.market_value || 0), 0);
      
      document.getElementById('initial-cash').textContent = '¥' + account.initial_cash.toLocaleString();
      document.getElementById('current-cash').textContent = '¥' + account.current_cash.toLocaleString();
      document.getElementById('position-value').textContent = '¥' + positionValue.toLocaleString();
      document.getElementById('total-value').textContent = '¥' + account.total_value.toLocaleString();
      
      const returnEl = document.getElementById('total-return');
      returnEl.textContent = (account.total_return >= 0 ? '+' : '') + '¥' + account.total_return.toLocaleString();
      returnEl.className = 'stat-value ' + (account.total_return >= 0 ? 'positive' : 'negative');
      
      const rateEl = document.getElementById('return-rate');
      rateEl.textContent = (account.return_rate >= 0 ? '+' : '') + (account.return_rate * 100).toFixed(2) + '%';
      rateEl.className = 'stat-value ' + (account.return_rate >= 0 ? 'positive' : 'negative');
    }
    
    function showCreateModal() {
      const modal = document.getElementById('create-modal');
      if (!modal) {
        console.error('找不到弹窗元素');
        return;
      }
      modal.classList.add('show');
      // 重置表单
      const form = modal.querySelector('form');
      if (form) form.reset();
    }

    function closeCreateModal() {
      const modal = document.getElementById('create-modal');
      if (modal) {
        modal.classList.remove('show');
      }
    }
    
    async function createAccount(e) {
      e.preventDefault();
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;

      const data = {
        account_name: form.account_name.value.trim(),
        initial_cash: parseInt(form.initial_cash.value)
      };

      // 前端验证
      if (!data.account_name) {
        alert('请输入账户名称');
        return;
      }
      if (!data.initial_cash || data.initial_cash < 10000) {
        alert('初始资金不能少于 10000 元');
        return;
      }

      try {
        submitBtn.textContent = '创建中...';
        submitBtn.disabled = true;

        const result = await api('/api/portfolio/account', {
          method: 'POST',
          body: JSON.stringify(data)
        });

        if (result.success) {
          closeCreateModal();
          form.reset();
          selectAccount(result.data.id);
          loadAccounts();
          alert('账户创建成功！');
        } else {
          alert('创建失败: ' + (result.error || '未知错误'));
        }
      } catch (err) {
        console.error('创建账户出错:', err);
        alert('创建失败: ' + err.message);
      } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    }
    
    // 初始化
    currentAccountId = parseInt(localStorage.getItem('current_account_id')) || null;
    loadAccounts();
  </script>
</body>
</html>
