<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A股投资系统 | 个股分析</title>
  <link rel="stylesheet" href="./pages/style.css" />
  <style>
    .top-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      margin-bottom: 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
    }
    .top-nav a {
      padding: 10px 16px;
      border-radius: 10px;
      color: var(--text-soft);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav a:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }
    .top-nav a.active {
      background: rgba(56, 189, 248, 0.15);
      color: var(--accent);
    }
    /* 股票卡片样式优化 */
    .stock-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin: 12px 0;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transition: all 0.2s ease;
    }
    .stock-card:hover {
      border-color: var(--accent);
    }
    .stock-card .stock-name {
      font-size: 1.1em;
      font-weight: 700;
      color: var(--text);
    }
    .stock-card .stock-meta {
      font-size: 0.875em;
      color: var(--text-soft);
      margin: 8px 0;
      line-height: 1.6;
    }
    .stock-card .stock-summary {
      font-size: 0.875em;
      color: var(--text-soft);
      margin: 8px 0;
      line-height: 1.5;
      padding: 8px 12px;
      background: rgba(56, 189, 248, 0.08);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
    }
    .stock-card .key-prices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px 0;
      font-size: 0.85em;
    }
    .stock-card .price-item {
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      text-align: center;
    }
    .stock-card .price-item.buy-price {
      color: var(--good);
    }
    .stock-card .price-item.stop-loss {
      color: var(--bad);
    }
    .stock-card .price-item.position {
      color: var(--accent);
    }
    .stock-card .stock-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .stock-card .btn-import {
      background: var(--good);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .stock-card .btn-import:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <nav class="top-nav">
      <a href="./select.html">选股分析</a>
      <a href="./analysis.html" class="active">个股分析</a>
      <a href="./monitor-pool.html">监控池</a>
      <a href="./conditional-order.html">条件单</a>
      <a href="./backtest.html">回测系统</a>
      <a href="./portfolio.html">账户管理</a>
    </nav>
    <section class="hero">
      <p class="eyebrow">A-Share Analysis</p>
      <h1>个股分析</h1>
      <p>将已选方向转化为可跟踪的候选股票，系统会基于方向热度、龙头属性给出初筛结果。</p>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <h2 class="section-title">已选方向</h2>
        <div id="selected-directions" class="tag-list"></div>
        <div class="status-row">
          <span id="direction-status">正在读取...</span>
          <div class="panel-actions">
            <a href="./select.html" class="button-link button-secondary">返回重新选股</a>
          </div>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <h2 class="section-title">执行分析</h2>
        <div class="toolbar">
          <button id="analyze-button" class="button button-large" type="button">分析方向个股</button>
          <input id="custom-stock-input" class="input" type="text" placeholder="自定义股票名称或代码，如 中际旭创 / 300308.SZ" />
          <button id="add-custom-button" class="button button-secondary" type="button">加入候选</button>
        </div>
        <div class="status-row">
          <span id="analyze-status">等待分析</span>
          <span id="selected-count">当前已选 0 只</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-inner">
        <h2 class="section-title">分析结果</h2>
        <p class="section-copy">推荐评分范围 1-5，数值越高越值得进入后续跟踪。点击"查看报告"可查看详细分析。</p>
        <div id="analysis-results" class="stock-grid"></div>
        <div id="analysis-empty" class="empty-state">点击"分析方向个股"后展示候选股票。</div>
        <div class="footer-bar">
          <p class="hint">勾选股票后点击"加入监控池"进入下一步。</p>
          <button id="go-monitor-pool" class="button button-large" type="button">加入监控池</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const DIRECTIONS_STORAGE_KEY = "selectedDirections";
    const ANALYSIS_RESULTS_KEY = "analysisResults";
    const MONITOR_POOL_DRAFT_KEY = "monitorPoolDraft";

    const selectedDirectionsContainer = document.getElementById("selected-directions");
    const directionStatus = document.getElementById("direction-status");
    const analyzeButton = document.getElementById("analyze-button");
    const analyzeStatus = document.getElementById("analyze-status");
    const resultsContainer = document.getElementById("analysis-results");
    const emptyState = document.getElementById("analysis-empty");
    const goMonitorPoolButton = document.getElementById("go-monitor-pool");
    const customStockInput = document.getElementById("custom-stock-input");
    const addCustomButton = document.getElementById("add-custom-button");
    const selectedCount = document.getElementById("selected-count");

    let directions = [];
    let stocks = [];
    let stockV2Data = new Map(); // 存储 v2 结构化数据

    function safeJsonParse(rawValue) {
      try {
        return JSON.parse(rawValue);
      } catch (error) {
        return null;
      }
    }

    function normalizeDirection(input) {
      if (typeof input === "string") {
        const name = input.trim();
        return name ? { name, score: 0, reason: "" } : null;
      }

      if (!input || typeof input !== "object") {
        return null;
      }

      const name = typeof input.name === "string" ? input.name.trim() : "";
      if (!name) {
        return null;
      }

      const scoreValue = Number(input.score);
      return {
        name,
        score: Number.isFinite(scoreValue) ? scoreValue : 0,
        reason: typeof input.reason === "string" ? input.reason.trim() : ""
      };
    }

    function normalizeDirections(input) {
      if (!input) return [];
      if (Array.isArray(input)) {
        const result = [];
        const seen = new Set();

        input.forEach((item) => {
          const normalized = normalizeDirection(item);
          if (!normalized || seen.has(normalized.name)) {
            return;
          }
          seen.add(normalized.name);
          result.push(normalized);
        });

        return result;
      }
      if (typeof input === "string") {
        const parsed = safeJsonParse(input);
        if (Array.isArray(parsed)) {
          return normalizeDirections(parsed);
        }
        return normalizeDirections(input.split(",").map((item) => ({ name: item })));
      }
      return [];
    }

    function normalizeStock(input) {
      if (!input || typeof input !== "object") {
        return null;
      }

      const name = typeof input.name === "string" ? input.name.trim() : "";
      const code = typeof input.code === "string" ? input.code.trim() : "";
      if (!name || !code) {
        return null;
      }

      const scoreValue = Number(input.score);
      const decision = typeof input.decision === "string" && input.decision.trim()
        ? input.decision.trim()
        : "观望";

      return {
        name,
        code,
        score: Number.isFinite(scoreValue) ? scoreValue : 0,
        decision,
        selected: Boolean(input.selected)
      };
    }

    function openSafeUrl(rawUrl) {
      if (typeof rawUrl !== "string" || !rawUrl.trim()) {
        return false;
      }

      let url;
      try {
        url = new URL(rawUrl, window.location.href);
      } catch (error) {
        return false;
      }

      if (!["http:", "https:", "file:"].includes(url.protocol)) {
        return false;
      }

      const openedWindow = window.open(url.toString(), "_blank", "noopener");
      if (openedWindow) {
        openedWindow.opener = null;
      }
      return true;
    }

    function readDirections() {
      const params = new URLSearchParams(window.location.search);
      const urlDirections = normalizeDirections(params.getAll("direction"));
      if (urlDirections.length > 0) {
        localStorage.setItem(DIRECTIONS_STORAGE_KEY, JSON.stringify(urlDirections));
        return urlDirections;
      }
      return normalizeDirections(localStorage.getItem(DIRECTIONS_STORAGE_KEY));
    }

    function renderDirections() {
      selectedDirectionsContainer.replaceChildren();

      if (directions.length === 0) {
        directionStatus.textContent = "未找到已选方向，请返回首页重新选择";
        const emptyTag = document.createElement("span");
        emptyTag.className = "tag";
        emptyTag.textContent = "暂无方向";
        selectedDirectionsContainer.appendChild(emptyTag);
        return;
      }

      directions.forEach((direction) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = direction.name;
        selectedDirectionsContainer.appendChild(tag);
      });

      directionStatus.textContent = `已选择 ${directions.length} 个方向`;
    }

    function getDecisionClass(decision) {
      if (decision === "买入") return "decision-buy";
      if (decision === "观望") return "decision-watch";
      return "decision-avoid";
    }

    function updateSelectedCount() {
      const checkedCount = resultsContainer.querySelectorAll('input[type="checkbox"]:checked').length;
      selectedCount.textContent = `当前已选 ${checkedCount} 只`;
    }

    function renderStocks() {
      resultsContainer.replaceChildren();

      if (stocks.length === 0) {
        emptyState.hidden = false;
        updateSelectedCount();
        return;
      }

      emptyState.hidden = true;
      stocks.forEach((stock, index) => {
        const card = document.createElement("article");
        card.className = "stock-card";
        card.setAttribute("data-stock-code", stock.code);

        const label = document.createElement("label");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.dataset.stockIndex = String(index);
        checkbox.checked = stock.selected;
        checkbox.addEventListener("change", (event) => {
          const targetIndex = Number(event.target.dataset.stockIndex);
          stocks[targetIndex].selected = event.target.checked;
          persistAnalysis();
          updateSelectedCount();
        });

        const infoWrap = document.createElement("span");
        const nameNode = document.createElement("span");
        nameNode.className = "stock-name";
        nameNode.textContent = stock.name;

        const meta = document.createElement("p");
        meta.className = "stock-meta";
        meta.append(
          `代码: ${stock.code}`,
          document.createElement("br"),
          `推荐评分: ${stock.score} / 5`,
          document.createElement("br"),
          "决策建议: "
        );

        const decisionNode = document.createElement("strong");
        decisionNode.className = getDecisionClass(stock.decision);
        decisionNode.textContent = stock.decision;
        meta.appendChild(decisionNode);

        // 检查是否有 v2 数据
        const v2Data = stockV2Data.get(stock.code);
        let summaryEl = null;
        let keyPricesEl = null;

        if (v2Data) {
          const strategy = v2Data.strategies?.balanced;
          const firstAction = strategy?.actions?.[0];
          const buyPrice = firstAction?.trigger_conditions?.[0]?.value;
          const stopLoss = firstAction?.stop_loss || v2Data.stop_loss;
          const position = firstAction?.position_percent || 0;

          if (strategy?.summary_text) {
            summaryEl = document.createElement("p");
            summaryEl.className = "stock-summary";
            // 确保 summary_text 是字符串
            const summaryText = typeof strategy.summary_text === 'string' ? strategy.summary_text : '';
            summaryEl.textContent = summaryText.slice(0, 100) + (summaryText.length > 100 ? '...' : '');
          }

          keyPricesEl = document.createElement("div");
          keyPricesEl.className = "key-prices";
          keyPricesEl.innerHTML = `
            <span class="price-item buy-price">买入价：¥${buyPrice ? Number(buyPrice).toFixed(2) : 'N/A'}</span>
            <span class="price-item stop-loss">止损价：¥${stopLoss ? Number(stopLoss).toFixed(2) : 'N/A'}</span>
            <span class="price-item position">仓位：${position}%</span>
          `;
        }

        infoWrap.appendChild(nameNode);
        infoWrap.appendChild(meta);
        if (summaryEl) infoWrap.appendChild(summaryEl);
        if (keyPricesEl) infoWrap.appendChild(keyPricesEl);

        label.appendChild(checkbox);
        label.appendChild(infoWrap);

        const actions = document.createElement("div");
        actions.className = "stock-actions";

        const reportButton = document.createElement("button");
        reportButton.className = "button-secondary view-report-btn";
        reportButton.type = "button";
        reportButton.textContent = "查看报告";
        reportButton.addEventListener("click", () => {
          viewStockReport(stock.name, stock.code);
        });
        actions.appendChild(reportButton);

        const regenerateButton = document.createElement("button");
        regenerateButton.className = "button-secondary regenerate-report-btn";
        regenerateButton.type = "button";
        regenerateButton.textContent = "再次生成报告";
        regenerateButton.addEventListener("click", () => {
          viewStockReport(stock.name, stock.code, { force: true });
        });
        actions.appendChild(regenerateButton);

        // 添加导入条件单按钮
        if (v2Data) {
          const importButton = document.createElement("button");
          importButton.className = "button-secondary btn-import";
          importButton.type = "button";
          importButton.textContent = "导入条件单";
          importButton.addEventListener("click", () => {
            importToConditional(stock.code, stock.name, "balanced");
          });
          actions.appendChild(importButton);
        }

        card.appendChild(label);
        card.appendChild(actions);
        resultsContainer.appendChild(card);
      });

      updateSelectedCount();
    }

    async function viewStockReport(stockName, stockCode, options = {}) {
      const force = options.force === true;
      analyzeStatus.textContent = force ? `正在重新生成 ${stockName} 的深度分析报告...` : `正在获取 ${stockName} 的分析报告...`;

      try {
        // 如果不是强制重新生成，先检查今天是否已生成报告
        if (!force) {
          const today = new Date().toISOString().split('T')[0].replace(/-/g, '');
          const checkResponse = await fetch(`/api/analysis/reports/${stockCode}`);
          const checkData = await checkResponse.json();
          
          if (checkData.success && checkData.reports && checkData.reports.length > 0) {
            const todayReport = checkData.reports.find(r => r.date === today);
            if (todayReport) {
              analyzeStatus.textContent = `发现今日已生成的报告，正在打开...`;
              openSafeUrl(todayReport.url);
              return;
            }
          }
        }

        // 并行调用 v2 API 和报告生成
        const [v2Response, reportResponse] = await Promise.all([
          fetch(`/api/v2/analyze/report?ts_code=${encodeURIComponent(stockCode)}`),
          fetch("/api/analysis/report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ stock_name: stockName, stock_code: stockCode })
          })
        ]);

        // 处理 v2 数据
        if (v2Response.ok) {
          const v2Data = await v2Response.json();
          if (v2Data.success && v2Data.data) {
            stockV2Data.set(stockCode, v2Data.data);
            // 更新股票卡片显示
            updateStockCardWithV2Data(stockCode, v2Data.data);
          }
        }

        // 处理报告生成
        if (reportResponse.ok) {
          const data = await reportResponse.json();
          if (data.report_path && openSafeUrl(data.report_path)) {
            analyzeStatus.textContent = `已打开 ${stockName} 分析报告`;
          } else {
            analyzeStatus.textContent = `报告生成成功，但未返回路径`;
          }
        } else {
          const errorPayload = await reportResponse.json().catch(() => null);
          analyzeStatus.textContent = errorPayload?.message || `个股分析报告生成失败（${reportResponse.status}）`;
        }
      } catch (error) {
        analyzeStatus.textContent = error.message || `暂无该股票的分析报告`;
      }
    }

    // 使用 v2 数据更新股票卡片
    function updateStockCardWithV2Data(stockCode, v2Data) {
      const card = document.querySelector(`[data-stock-code="${stockCode}"]`);
      if (!card) return;

      const strategy = v2Data.strategies?.balanced;
      const firstAction = strategy?.actions?.[0];
      const buyPrice = firstAction?.trigger_conditions?.[0]?.value;
      const stopLoss = firstAction?.stop_loss || v2Data.stop_loss;
      const position = firstAction?.position_percent || 0;

      // 更新或创建 key-prices 元素
      let keyPricesEl = card.querySelector('.key-prices');
      if (!keyPricesEl) {
        keyPricesEl = document.createElement('div');
        keyPricesEl.className = 'key-prices';
        const summaryEl = card.querySelector('.stock-summary');
        if (summaryEl) {
          summaryEl.after(keyPricesEl);
        } else {
          card.querySelector('label span').appendChild(keyPricesEl);
        }
      }

      keyPricesEl.innerHTML = `
        <span class="price-item buy-price">买入价：¥${buyPrice ? Number(buyPrice).toFixed(2) : 'N/A'}</span>
        <span class="price-item stop-loss">止损价：¥${stopLoss ? Number(stopLoss).toFixed(2) : 'N/A'}</span>
        <span class="price-item position">仓位：${position}%</span>
      `;

      // 更新或创建 summary 元素
      let summaryEl = card.querySelector('.stock-summary');
      if (!summaryEl && strategy?.summary_text) {
        summaryEl = document.createElement('p');
        summaryEl.className = 'stock-summary';
        const metaEl = card.querySelector('.stock-meta');
        if (metaEl) {
          metaEl.after(summaryEl);
        }
      }
      if (summaryEl && strategy?.summary_text) {
        // 确保 summary_text 是字符串
        const summaryText = typeof strategy.summary_text === 'string' ? strategy.summary_text : '';
        summaryEl.textContent = summaryText.slice(0, 100) + (summaryText.length > 100 ? '...' : '');
      }

      // 添加导入条件单按钮
      let actionsEl = card.querySelector('.stock-actions');
      if (actionsEl && !actionsEl.querySelector('.btn-import')) {
        const importBtn = document.createElement('button');
        importBtn.className = 'button-secondary btn-import';
        importBtn.type = 'button';
        importBtn.textContent = '导入条件单';
        // 从 card 中获取股票名称
        const nameEl = card.querySelector('.stock-name');
        const name = nameEl ? nameEl.textContent : stockCode;
        importBtn.addEventListener('click', () => importToConditional(stockCode, name, 'balanced'));
        actionsEl.appendChild(importBtn);
      }
    }

    // 导入条件单功能
    async function importToConditional(stockCode, stockName, riskType) {
      try {
        const response = await fetch(`/api/v2/analyze/strategy/${encodeURIComponent(stockCode)}/${riskType}`);
        const result = await response.json();

        if (!result.success) {
          alert('获取策略失败：' + result.error);
          return;
        }

        // 跳转到条件单界面，传递策略数据
        const strategyData = encodeURIComponent(JSON.stringify(result.data));
        window.location.href = `./conditional-order.html?import=${strategyData}`;
      } catch (error) {
        console.error('导入失败:', error);
        alert('导入失败：' + error.message);
      }
    }

    function persistAnalysis() {
      localStorage.setItem(ANALYSIS_RESULTS_KEY, JSON.stringify(stocks));
    }

    function restoreAnalysis() {
      const cached = safeJsonParse(localStorage.getItem(ANALYSIS_RESULTS_KEY));
      if (!Array.isArray(cached)) return;
      stocks = cached.map((stock) => normalizeStock(stock)).filter(Boolean);
      renderStocks();
    }

    async function analyzeDirections() {
      if (directions.length === 0) {
        analyzeStatus.textContent = "没有可分析的方向，请先回到首页完成选择";
        return;
      }

      analyzeButton.disabled = true;
      analyzeStatus.textContent = "分析中...";

      try {
        // 将对象数组转换为字符串数组（后端期望格式）
        const directionNames = directions.map(d => typeof d === 'string' ? d : d.name);

        const response = await fetch("/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ directions: directionNames }),
        });

        if (!response.ok) {
          const errorPayload = await response.json().catch(() => null);
          throw new Error(errorPayload?.message || `接口异常: ${response.status}`);
        }

        const payload = await response.json();
        const nextStocks = Array.isArray(payload.stocks) ? payload.stocks : [];

        stocks = nextStocks
          .map((stock) => normalizeStock({ ...stock, selected: false }))
          .filter(Boolean);

        persistAnalysis();
        renderStocks();
        analyzeStatus.textContent = `分析完成，返回 ${stocks.length} 只候选股票`;

        // 异步获取 v2 数据更新卡片
        stocks.forEach(async (stock) => {
          try {
            const v2Response = await fetch(`/api/v2/analyze/report?ts_code=${encodeURIComponent(stock.code)}`);
            if (v2Response.ok) {
              const v2Data = await v2Response.json();
              if (v2Data.success && v2Data.data) {
                stockV2Data.set(stock.code, v2Data.data);
                updateStockCardWithV2Data(stock.code, v2Data.data);
              }
            }
          } catch (e) {
            console.warn(`获取 ${stock.code} 的 v2 数据失败:`, e.message);
          }
        });

      } catch (error) {
        analyzeStatus.textContent = `分析失败: ${error.message}`;
      } finally {
        analyzeButton.disabled = false;
      }
    }

    function inferCustomStock(rawValue) {
      const value = rawValue.trim();
      if (!value) return null;

      const looksLikeCode = /^[0-9]{6}(?:\.(?:SZ|SH))?$/i.test(value);
      if (looksLikeCode) {
        const normalizedCode = value.includes(".")
          ? value.toUpperCase()
          : `${value}.${value.startsWith("6") ? "SH" : "SZ"}`;
        return {
          name: "自定义股票",
          code: normalizedCode,
          score: 3,
          decision: "观望",
          selected: true,
        };
      }

      return {
        name: value,
        code: value,
        score: 3,
        decision: "观望",
        selected: true,
      };
    }

    function addCustomStock() {
      const stock = inferCustomStock(customStockInput.value);
      if (!stock) {
        analyzeStatus.textContent = "请输入股票名称或代码";
        return;
      }
      stocks.unshift(stock);
      customStockInput.value = "";
      persistAnalysis();
      renderStocks();
      analyzeStatus.textContent = "已加入自定义候选股票";
    }

    function goToMonitorPool() {
      const selectedStocks = stocks.filter((stock) => stock.selected);
      if (selectedStocks.length === 0) {
        analyzeStatus.textContent = "请至少选择一只股票";
        return;
      }
      localStorage.setItem(MONITOR_POOL_DRAFT_KEY, JSON.stringify(selectedStocks));
      window.location.href = "./monitor-pool.html";
    }

    analyzeButton.addEventListener("click", analyzeDirections);
    addCustomButton.addEventListener("click", addCustomStock);
    goMonitorPoolButton.addEventListener("click", goToMonitorPool);
    customStockInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addCustomStock();
      }
    });

    directions = readDirections();
    renderDirections();
    restoreAnalysis();

    // 查看选股报告 - 直接使用页面中的链接，无需额外绑定事件
    // 原 view-report 事件绑定已移除（页面中无此 ID 元素）
  </script>
</body>
</html>
