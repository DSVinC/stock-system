<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>选股历史 | A 股投资系统</title>
  <link rel="stylesheet" href="./pages/style.css">
  <style>
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .report-card {
      padding: 1.5rem;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      transition: all 0.2s ease;
    }
    .report-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .report-date {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
    }
    .report-stats {
      display: flex;
      gap: 1.5rem;
      color: var(--text-faint);
      font-size: 0.875rem;
    }
    .report-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
    }
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-faint);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <!-- 顶部导航 -->
    <nav class="top-nav">
      <a href="./select.html">选股分析</a>
      <a href="./analysis.html">个股分析</a>
      <a href="./monitor-pool.html">监控池</a>
      <a href="./conditional-order.html">条件单</a>
      <a href="./backtest.html">回测系统</a>
      <a href="./portfolio.html">账户管理</a>
    </nav>

    <!-- 页面内容 -->
    <div class="hero">
      <div class="eyebrow">STOCK SELECTION HISTORY</div>
      <h1>📜 选股历史</h1>
      <p class="subtitle">查看历史选股报告，追溯调仓记录</p>
    </div>

    <!-- 选股历史列表 -->
    <div class="panel">
      <div class="panel-inner">
        <div id="historyList" class="history-list">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>正在加载选股历史...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadHistory() {
      try {
        const res = await fetch('/api/selection/history?limit=50');
        const { data } = await res.json();
        
        const container = document.getElementById('historyList');
        
        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📭</div>
              <h3 class="empty-title">暂无选股历史</h3>
              <p class="empty-copy">选股完成后会自动生成报告，请稍后再来查看</p>
              <a href="./select.html" class="btn btn-primary" style="margin-top: 1rem;">去选股</a>
            </div>
          `;
          return;
        }
        
        const html = data.map(report => {
          const industries = report.industries ? JSON.parse(report.industries) : [];
          const industryText = Array.isArray(industries) ? industries.slice(0, 3).join('、') : 'N/A';
          
          return `
            <div class="report-card">
              <div class="report-header">
                <div class="report-date">${report.trade_date}</div>
                <div class="report-stats">
                  <span>选中 ${report.selected_count || 0} 只股票</span>
                  <span>行业：${industryText}</span>
                </div>
              </div>
              <div class="report-actions">
                <a href="./selection-report.html?id=${report.report_id}" class="btn btn-primary">查看详情</a>
                <button class="btn btn-secondary" onclick="backtestFromReport('${report.report_id}')">导入回测</button>
              </div>
            </div>
          `;
        }).join('');
        
        container.innerHTML = html;
      } catch (error) {
        console.error('加载选股历史失败:', error);
        document.getElementById('historyList').innerHTML = `
          <div class="empty-state">
            <h3 class="empty-title">加载失败</h3>
            <p class="empty-copy">${error.message}</p>
            <button class="btn btn-primary" onclick="loadHistory()" style="margin-top: 1rem;">重试</button>
          </div>
        `;
      }
    }
    
    function backtestFromReport(reportId) {
      const params = new URLSearchParams();
      params.set('import', 'selection-report');
      params.set('id', reportId);
      window.location.href = `./backtest.html?${params.toString()}`;
    }
    
    // 页面加载时获取历史
    loadHistory();
  </script>
</body>
</html>
